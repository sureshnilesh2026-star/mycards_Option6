<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Page</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: block;
        overflow: hidden;
        background: #111827;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .content {
        width: 360px;
        max-width: 360px;
        height: 2500px;
        margin: 0 auto;
        position: relative;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding-top: 60px;
        box-sizing: border-box;
        gap: 16px;
      }
      .bottom-bar {
        position: absolute;
        left: 0;
        bottom: 0;
        width: 100%;
        height: 72px;
        border-top: 1px solid #e5e7eb;
        background: #ffffff;
      }
      .title {
        margin: 0;
        font-size: 24px;
        font-weight: 700;
        color: #111827;
      }
      .creditcard_swiggy {
        width: 264px;
        height: 156px;
        border-radius: 24px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.16);
        box-shadow: 0 14px 34px rgba(0, 0, 0, 0.42);
        background: center / cover no-repeat url("./assets/texture-swiggy.png");
      }
    </style>
  </head>
  <body>
    <div class="content">
      <h1 class="title">Testing</h1>
      <article class="creditcard_swiggy" aria-label="Swiggy credit card"></article>
      <div class="bottom-bar" aria-label="Bottom bar"></div>
    </div>
  </body>
</html>
