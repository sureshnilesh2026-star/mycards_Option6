<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <style>
      * {
        box-sizing: border-box;
      }
      html {
        height: 100%;
        overflow: hidden;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        height: 100%;
        overflow: hidden;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      html::-webkit-scrollbar,
      body::-webkit-scrollbar {
        display: none;
      }
      body {
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
        min-height: 100vh;
        min-height: 100dvh;
        padding: 0;
        box-sizing: border-box;
        /* Tailwind bg-neutral-800 */
        background: #262626;
      }
      /* Mobile shell: full width; viewport height — frame scrolls inside so bottom bar stays visible */
      .mobile-page {
        position: relative;
        width: 100%;
        max-width: none;
        min-height: 100vh;
        min-height: 100dvh;
        height: 100dvh;
        max-height: 100dvh;
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        overflow: hidden;
      }
      @supports not (height: 100dvh) {
        .mobile-page {
          height: 100vh;
          max-height: 100vh;
        }
      }
      .mobile-page__bg {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: #0c101f;
        z-index: 0;
        pointer-events: none;
        transition: background-color 0.56s cubic-bezier(0.2, 0.85, 0.2, 1);
      }
      .mobile-page--gradient-in .mobile-page__bg {
        background-color: #ffffff;
      }
      .mobile-page__gradient {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0c101f 0%, #131b34 50%, #1a2545 100%);
        z-index: 1;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.56s cubic-bezier(0.2, 0.85, 0.2, 1);
      }
      .mobile-page--gradient-in .mobile-page__gradient {
        opacity: 1;
      }
      @media (prefers-reduced-motion: reduce) {
        .mobile-page__gradient,
        .mobile-page__bg {
          transition: none;
        }
        .mobile-page__bg {
          background-color: #ffffff;
        }
        .mobile-page__gradient {
          opacity: 1;
        }
        .frame-root.cd-intro .frame-root__bottombar {
          transition: none;
        }
      }
      .frame-root {
        position: relative;
        z-index: 2;
        width: 100%;
        flex: 1 1 auto;
        min-height: 0;
        height: auto;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        background: transparent;
      }
      .frame-root__scrollable {
        flex: 1 1 auto;
        min-height: 0;
        width: 100%;
        overflow-x: hidden;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .frame-root__scrollable::-webkit-scrollbar {
        display: none;
      }
      .frame-root__mycards-header {
        width: 100%;
        flex-shrink: 0;
        background-color: transparent;
        line-height: 0;
      }
      .frame-root.cd-intro .frame-root__mycards-header {
        overflow: hidden;
      }
      .frame-root__mycards-svg {
        display: block;
        width: 100%;
        height: auto;
        max-height: 55px;
        object-fit: contain;
        object-position: left top;
      }
      .frame-root__product-tabs {
        padding: 8px 0 12px;
        background: transparent;
        min-width: 0;
      }
      .frame-root__product-tabs-scroll {
        width: 100%;
        min-width: 0;
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-x: contain;
        touch-action: pan-x;
        scrollbar-width: none;
        padding: 0 12px;
      }
      .frame-root__product-tabs-scroll::-webkit-scrollbar {
        display: none;
      }
      .frame-root__product-tabs-row {
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        align-items: center;
        gap: 8px;
        width: max-content;
      }
      .product-chip {
        box-sizing: border-box;
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 28px;
        margin: 0;
        padding: 0;
        border: none;
        border-radius: 14px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        font-size: 12px;
        font-weight: 600;
        line-height: 1;
        white-space: nowrap;
        cursor: pointer;
        appearance: none;
        -webkit-tap-highlight-color: transparent;
      }
      .product-chip--active {
        background: #fff;
        color: #0c101f;
      }
      .product-chip:not(.product-chip--active) {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }
      .product-chip--w90 {
        width: 90px;
      }
      .product-chip--w86 {
        width: 86px;
      }
      .product-chip--w70 {
        width: 70px;
      }
      .product-chip--w115 {
        width: 115px;
      }
      /* Cards layer — first card top at 109px from frame; rail absolute on frame-root */
      .frame-root__creditcard {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        gap: 0;
        background: transparent;
        min-width: 0;
        min-height: 0;
      }
      .frame-root__creditcard-scroll {
        position: relative;
        left: auto;
        right: auto;
        top: auto;
        width: 100%;
        min-width: 0;
        height: 156px;
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-x: contain;
        touch-action: pan-x;
        scrollbar-width: none;
        scroll-snap-type: x mandatory;
        /* (360 − 264) / 2 → card centers; ~12px card gap shows sliver of next card */
        padding: 0 48px;
        box-sizing: border-box;
        z-index: 2;
      }
      .frame-root__creditcard-scroll::-webkit-scrollbar {
        display: none;
      }
      .frame-root__creditcard-row {
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        align-items: flex-start;
        gap: 12px;
        width: max-content;
      }
      .bank-card {
        position: relative;
        flex: 0 0 auto;
        width: 264px;
        height: 156px;
        aspect-ratio: 264 / 156;
        border-radius: 14px;
        scroll-snap-align: center;
        scroll-snap-stop: always;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
        overflow: hidden;
        background: #0c101f;
        margin: 0;
        padding: 0;
        border: none;
        cursor: pointer;
        font: inherit;
        color: inherit;
        appearance: none;
        -webkit-tap-highlight-color: transparent;
        text-align: left;
      }
      .bank-card:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.55);
        outline-offset: 3px;
      }
      .bank-card:active {
        filter: brightness(0.96);
      }
      /* First card: fixed Y via rail top; no motion from intro transitions */
      .frame-root__creditcard .bank-card:first-child {
        transition: none !important;
        transform: none !important;
      }
      .frame-root__creditcard .bank-card:first-child:active {
        transform: none;
      }
      .bank-card__img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center;
      }
      .frame-root__creditcard-below {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        gap: 16px;
        margin-top: 16px;
        padding: 0 48px 18px;
        line-height: 0;
        position: relative;
        z-index: 2;
      }
      .frame-root__card-dots-svg {
        display: block;
        flex-shrink: 0;
        width: 42px;
        height: auto;
      }
      .frame-root__card-dot {
        fill: #4f4f4f;
        cursor: pointer;
        transition: fill 0.32s ease;
      }
      .frame-root__card-dot--active {
        fill: #d9d9d9;
      }
      @media (prefers-reduced-motion: reduce) {
        .frame-root__card-dot {
          transition: none;
        }
      }
      /* Card settings — tile grid, then “Card Settings” row under icons */
      .frame-root__card-settings {
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        width: 100%;
        min-width: 0;
        box-sizing: border-box;
        background: transparent;
        position: relative;
        z-index: 1;
        margin-top: 16px;
      }
      .frame-root__creditcard + .frame-root__card-settings {
        margin-top: 16px;
      }
      .frame-root__card-settings__toggle {
        flex-shrink: 0;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 6px;
        width: 100%;
        margin: 0;
        margin-top: -8px;
        padding: 10px 20px 14px;
        border: none;
        background: transparent;
        color: #9ca3af;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        font-size: 11px;
        font-weight: 400;
        line-height: 1.25;
        letter-spacing: 0.01em;
        cursor: pointer;
        appearance: none;
        -webkit-tap-highlight-color: transparent;
      }
      .frame-root__card-settings__toggle:hover {
        color: #b4b9c2;
      }
      .frame-root__card-settings__toggle:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.5);
        outline-offset: -2px;
      }
      .frame-root__card-settings__chevron {
        display: block;
        width: 14px;
        height: 14px;
        flex-shrink: 0;
        color: currentColor;
        transition: transform 0.42s ease;
      }
      .frame-root__card-settings__chevron svg {
        display: block;
        width: 14px;
        height: 14px;
      }
      .frame-root__card-settings--open .frame-root__card-settings__chevron {
        transform: rotate(180deg);
      }
      .frame-root__card-settings--open .frame-root__card-settings__toggle {
        border-top: none;
      }
      .frame-root__card-settings__panel {
        flex-shrink: 0;
        max-height: 0;
        overflow: hidden;
        background: transparent;
        transition: max-height 0.5s ease;
      }
      .frame-root__card-settings--open .frame-root__card-settings__panel {
        max-height: 220px;
      }
      .frame-root__card-settings__panel-inner {
        padding: 16px 16px 12px;
        box-sizing: border-box;
      }
      .frame-root__card-settings__figure {
        position: relative;
        width: 100%;
        max-width: 326px;
        margin: 0 auto;
        aspect-ratio: 326 / 140;
      }
      .frame-root__card-settings__art {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center;
        vertical-align: top;
        pointer-events: none;
        user-select: none;
      }
      .frame-root__card-settings__hits {
        position: absolute;
        inset: 0;
      }
      .frame-root__card-settings__hit {
        position: absolute;
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        border: none;
        border-radius: 14px;
        background: transparent;
        cursor: pointer;
        appearance: none;
        -webkit-tap-highlight-color: transparent;
      }
      .frame-root__card-settings__hit:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.55);
        outline-offset: 2px;
      }
      .frame-root__card-settings__hit--1 {
        left: 0;
        top: 0;
        width: 33.333%;
        height: 47.1429%;
      }
      .frame-root__card-settings__hit--2 {
        left: 33.333%;
        top: 0;
        width: 33.333%;
        height: 47.1429%;
      }
      .frame-root__card-settings__hit--3 {
        left: 66.666%;
        top: 0;
        width: 33.334%;
        height: 47.1429%;
      }
      .frame-root__card-settings__hit--4 {
        left: 0;
        top: 52.8571%;
        width: 33.333%;
        height: 47.1429%;
      }
      .frame-root__card-settings__hit--5 {
        left: 33.333%;
        top: 52.8571%;
        width: 33.333%;
        height: 47.1429%;
      }
      .frame-root__card-settings__hit--6 {
        left: 66.666%;
        top: 52.8571%;
        width: 33.334%;
        height: 47.1429%;
      }
      @media (prefers-reduced-motion: reduce) {
        .frame-root__card-settings__panel,
        .frame-root__card-settings__chevron {
          transition: none;
        }
      }
      /* Bottom sheet–style panel under cards */
      .content {
        flex: 0 0 auto;
        min-height: 0;
        min-width: 0;
        width: 100%;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        text-align: left;
        background: #fff;
        border-radius: 24px 24px 0 0;
        overflow: hidden;
      }
      .content__accent {
        flex: 0 0 auto;
        height: 3px;
        border-radius: 24px 24px 0 0;
        background: linear-gradient(
          90deg,
          #e8928a 0%,
          #4a9ef5 50%,
          #e8928a 100%
        );
      }
      .content__body {
        flex: 0 0 auto;
        min-height: 0;
        min-width: 0;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
        padding-top: 20px;
        padding-left: 0;
        padding-right: 0;
        padding-bottom: 24px;
        box-sizing: border-box;
        overflow-x: hidden;
        overflow-y: visible;
      }
      .content1 {
        flex-shrink: 0;
        align-self: stretch;
        width: 100%;
        margin-left: 0;
        margin-right: 0;
        min-width: 0;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 16px;
      }
      .content1__options {
        flex-shrink: 0;
        width: auto;
        min-width: 0;
        margin-left: 16px;
        margin-right: 16px;
        box-sizing: border-box;
      }
      .content1__options-img {
        display: block;
        width: 100%;
        height: auto;
        margin: 0;
      }
      .content1__due {
        flex-shrink: 0;
        width: auto;
        min-width: 0;
        margin-left: 16px;
        margin-right: 16px;
        box-sizing: border-box;
      }
      .content1__due-img {
        display: block;
        width: 100%;
        height: auto;
        margin: 0;
      }
      .content1__explore {
        flex-shrink: 0;
        align-self: stretch;
        width: 100%;
        min-width: 0;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 16px;
        overflow: visible;
      }
      .content1__explore-heading {
        flex-shrink: 0;
        width: auto;
        min-width: 0;
        margin-left: 16px;
        margin-right: 16px;
        box-sizing: border-box;
      }
      .content1__explore-title {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        font-size: 12px;
        font-weight: 400;
        line-height: 1;
        color: #949a9f;
        text-transform: uppercase;
      }
      /* Banner Option 2 — full-width horizontal rail under explore (peek / scroll) */
      .content1__explore-banner2 {
        flex-shrink: 0;
        min-width: 0;
        width: 100%;
        max-width: none;
        margin-left: 0;
        margin-right: 0;
        padding-left: 8px;
        padding-right: 16px;
        box-sizing: border-box;
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-x: contain;
        touch-action: pan-x;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .content1__explore-banner2::-webkit-scrollbar {
        display: none;
      }
      .content1__explore-banner2-img {
        display: block;
        width: 520px;
        height: auto;
        max-width: none;
        /* SVG: ~36px empty above cards; x≈3 inset + padding 8px → 8px gap frame→first card */
        margin: -36px 0 0 -3px;
      }
      .content1__emi {
        flex-shrink: 0;
        position: relative;
        width: auto;
        min-width: 0;
        margin-left: 16px;
        margin-right: 16px;
        box-sizing: border-box;
      }
      .content1__emi-title {
        position: absolute;
        left: 12px;
        top: 2px;
        height: 20px;
        display: flex;
        align-items: center;
        transform: none;
        z-index: 2;
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        font-size: 12px;
        font-weight: 400;
        line-height: 1;
        color: #949a9f;
        text-transform: uppercase;
      }
      .content1__emi-img {
        display: block;
        width: 100%;
        height: auto;
        margin: 0;
      }
      /* content2: heading + cards rail both inset 16px L/R (via section margin) */
      .content2 {
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
        width: auto;
        max-width: 100%;
        min-width: 0;
        margin: 8px 16px 16px 16px;
        padding: 0;
        box-sizing: border-box;
        align-self: stretch;
        overflow: visible;
      }
      .content2__promo-head {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        width: 100%;
        min-width: 0;
        max-width: 100%;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .content2__deals-line {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        font-size: 12px;
        font-weight: 600;
        line-height: 1.25;
        color: #949a9f;
        text-transform: uppercase;
        letter-spacing: 0.02em;
      }
      .content2__view-all {
        flex-shrink: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.25;
        color: #1C3FCA;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        margin-left: auto;
        text-align: right;
        display: inline-block;
      }
      .content2__view-all:hover {
        text-decoration: underline;
      }
      .content2__view-all:focus-visible {
        outline: 2px solid #1C3FCA;
        outline-offset: 2px;
        border-radius: 2px;
      }
      .content2__cards-scroll {
        flex-shrink: 0;
        min-width: 0;
        width: calc(100% + 32px);
        max-width: none;
        margin-left: -16px;
        margin-right: -16px;
        padding: 0 16px 4px 16px;
        box-sizing: border-box;
        align-self: stretch;
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-x: contain;
        touch-action: pan-x;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .content2__cards-scroll::-webkit-scrollbar {
        display: none;
      }
      .content2__cards-crop {
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        align-items: stretch;
        gap: 12px;
        width: max-content;
        max-width: none;
        box-sizing: border-box;
      }
      .content2__card-img {
        display: block;
        width: 268px;
        height: auto;
        flex-shrink: 0;
        border-radius: 0;
        vertical-align: top;
        user-select: none;
      }
      .content3 {
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
        width: auto;
        max-width: 100%;
        min-width: 0;
        margin: -24px 16px 16px 16px;
        padding: 0;
        box-sizing: border-box;
        align-self: stretch;
        overflow: visible;
      }
      .content3__heading {
        flex-shrink: 0;
        width: 100%;
        min-width: 0;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        line-height: 0;
      }
      .content3__title-sr {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      .content3__title-img {
        display: block;
        width: 100%;
        max-width: 328px;
        height: auto;
        vertical-align: top;
      }
      .content3__scroll {
        flex-shrink: 0;
        min-width: 0;
        width: calc(100% + 32px);
        max-width: none;
        margin-left: -16px;
        margin-right: -16px;
        padding: 0 16px;
        box-sizing: border-box;
        height: 327px;
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-x: contain;
        touch-action: pan-x;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .content3__scroll::-webkit-scrollbar {
        display: none;
      }
      .content3__rail {
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        align-items: stretch;
        gap: 16px;
        width: max-content;
        height: 327px;
        box-sizing: border-box;
      }
      .content3__card-slice {
        flex: 0 0 200px;
        width: 200px;
        height: 327px;
        overflow: hidden;
        box-sizing: border-box;
        border-radius: 12px;
        border: 1px solid rgba(236, 237, 243, 1);
      }
      .content3__slice-img {
        display: block;
        width: 848px;
        height: 365px;
        max-width: none;
        margin: -38px 0 0 0;
        flex-shrink: 0;
        vertical-align: top;
        user-select: none;
      }
      .content3__card-slice--1 .content3__slice-img {
        margin-left: -216px;
      }
      .content3__card-slice--2 .content3__slice-img {
        margin-left: -432px;
      }
      .content3__card-slice--3 .content3__slice-img {
        margin-left: -648px;
      }
      /*
       * Bottom nav — full frame width, fixed 78px height; artwork scales in slot (mycards-bottombar.svg).
       */

    <script>
      (function () {
        var scrollEl = document.querySelector(".frame-root__creditcard-scroll");
        var cards = document.querySelectorAll(".frame-root__creditcard .bank-card");
        if (!scrollEl || !cards.length) return;

        var dotsBelow = document.getElementById("frame-root__creditcard-below");
        var dotRects = document.querySelectorAll(".frame-root__card-dot");

        var smoothScroll =
          !window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        var scrollSyncRaf = null;
        function scheduleDotsSync() {
          if (scrollSyncRaf != null) return;
          scrollSyncRaf = requestAnimationFrame(function () {
            scrollSyncRaf = null;
            syncDotsWithScroll();
          });
        }

        function indexOfCardNearestScrollCenter() {
          var scrollRect = scrollEl.getBoundingClientRect();
          var mid = scrollRect.left + scrollRect.width / 2;
          var best = 0;
          var bestDist = Infinity;
          for (var i = 0; i < cards.length; i++) {
            var r = cards[i].getBoundingClientRect();
            var c = r.left + r.width / 2;
            var d = Math.abs(c - mid);
            if (d < bestDist) {
              bestDist = d;
              best = i;
            }
          }
          return best;
        }

        function setActiveDot(index) {
          var max = Math.min(dotRects.length, cards.length) - 1;
          var i = Math.max(0, Math.min(index, max));
          dotRects.forEach(function (el, j) {
            el.classList.toggle("frame-root__card-dot--active", j === i);
          });
          if (dotsBelow) {
            dotsBelow.setAttribute(
              "aria-label",
              "Card " + (i + 1) + " of " + cards.length
            );
          }
        }

        function syncDotsWithScroll() {
          setActiveDot(indexOfCardNearestScrollCenter());
        }

        function centerCardHorizontally(card) {
          var cardRect = card.getBoundingClientRect();
          var scrollRect = scrollEl.getBoundingClientRect();
          var cardMid = cardRect.left + cardRect.width / 2;
          var scrollMid = scrollRect.left + scrollRect.width / 2;
          var delta = cardMid - scrollMid;
          scrollEl.scrollBy({
            left: delta,
            behavior: smoothScroll ? "smooth" : "auto",
          });
        }

        cards.forEach(function (card) {
          card.addEventListener("click", function () {
            centerCardHorizontally(card);
          });
        });

        dotRects.forEach(function (dot, i) {
          dot.addEventListener("click", function (e) {
            e.stopPropagation();
            if (cards[i]) {
              centerCardHorizontally(cards[i]);
            }
          });
        });

        scrollEl.addEventListener("scroll", scheduleDotsSync, { passive: true });
        window.addEventListener("resize", syncDotsWithScroll);

        window.addEventListener("card-details-intro-morecards", function () {
          scrollEl.scrollLeft = 0;
          requestAnimationFrame(syncDotsWithScroll);
        });
        window.addEventListener("card-details-intro-done", function () {
          scrollEl.scrollLeft = 0;
          requestAnimationFrame(syncDotsWithScroll);
        });

        requestAnimationFrame(syncDotsWithScroll);
      })();
    </script>
    <script>
      (function () {
        var row = document.querySelector(".frame-root__product-tabs-row");
        if (!row) return;
        var chips = row.querySelectorAll("button.product-chip");
        chips.forEach(function (chip) {
          chip.addEventListener("click", function () {
            chips.forEach(function (c) {
              c.classList.remove("product-chip--active");
              c.setAttribute("aria-selected", "false");
            });
            chip.classList.add("product-chip--active");
            chip.setAttribute("aria-selected", "true");
          });
        });
      })();
    </script>
    <script>
      (function () {
        var root = document.getElementById("frame-root-card-settings");
        var toggle = document.getElementById("card-settings-toggle");
        var panel = document.getElementById("card-settings-panel");
        if (!root || !toggle || !panel) return;

        function applyOpen(open) {
          var stateName = open ? "expanded" : "collapsed";
          root.classList.toggle("frame-root__card-settings--open", open);
          root.setAttribute("data-settings-state", stateName);
          toggle.setAttribute("aria-expanded", open ? "true" : "false");
          panel.setAttribute("aria-hidden", open ? "false" : "true");
          if ("inert" in panel) {
            panel.inert = !open;
          }
        }

        toggle.addEventListener("click", function () {
          applyOpen(!root.classList.contains("frame-root__card-settings--open"));
        });

        applyOpen(root.classList.contains("frame-root__card-settings--open"));

        function collapseAfterOneSecond() {
          window.setTimeout(function () {
            applyOpen(false);
          }, 1000);
        }
        if (document.querySelector(".frame-root.cd-intro")) {
          window.addEventListener(
            "card-details-intro-done",
            collapseAfterOneSecond,
            { once: true }
          );
        } else {
          window.addEventListener("load", collapseAfterOneSecond, { once: true });
        }
      })();
    </script>
    <script>
      (function () {
        var root = document.querySelector(".frame-root");
        var shell = document.querySelector(".mobile-page");
        if (!root) return;
        if (!root.classList.contains("cd-intro")) {
          if (shell) shell.classList.add("mobile-page--gradient-in");
          return;
        }

        var animMs = 520;
        var gapMs = 160;
        /* Matches .frame-root__mycards-svg / .frame-root__product-tabs transition 0.56s in intro CSS */
        var logoMotionMs = 560;
        var tabsMotionMs = 560;
        var stepPauseMs = animMs + gapMs;
        /* Carousel cards: begin partway through the tabs motion (≈50%) so they start a bit earlier */
        var morecardsStartMs = logoMotionMs + Math.round(tabsMotionMs * 0.5);
        /* Settings + white content: shorter gap so they start a little earlier after carousel / each other */
        var settingsContentPauseMs = Math.round(stepPauseMs * 0.55);
        var reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        function after(ms, fn) {
          window.setTimeout(fn, ms);
        }

        function runIntroSequence(morecardsStartMs) {
          var t = morecardsStartMs;

          after(t, function () {
            root.classList.add("cd-intro--morecards");
            window.dispatchEvent(new CustomEvent("card-details-intro-morecards"));
          });
          t += settingsContentPauseMs;

          after(t, function () {
            root.classList.add("cd-intro--settings");
          });
          t += settingsContentPauseMs;

          after(t, function () {
            root.classList.add("cd-intro--content");
          });
          t += settingsContentPauseMs;

          after(t + 200, function () {
            root.classList.remove(
              "cd-intro",
              "cd-intro--logo",
              "cd-intro--tabs",
              "cd-intro--morecards",
              "cd-intro--settings",
              "cd-intro--content"
            );
            window.dispatchEvent(new CustomEvent("card-details-intro-done"));
          });
        }

        if (reduceMotion) {
          if (shell) shell.classList.add("mobile-page--gradient-in");
          root.classList.add("cd-intro--logo", "cd-intro--tabs");
          runIntroSequence(stepPauseMs);
          return;
        }

        /* Beat 1: gradient + background tint, header logo, bottom bar */
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            if (shell) shell.classList.add("mobile-page--gradient-in");
            root.classList.add("cd-intro--logo");
          });
        });

        /* Beat 2: product tabs — after logo transform/opacity transition ends */
        after(logoMotionMs, function () {
          root.classList.add("cd-intro--tabs");
        });

        runIntroSequence(morecardsStartMs);
      })();
    </script>
  </body>
</html>
