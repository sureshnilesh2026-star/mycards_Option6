<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=overlays-content"
    />
    <title>Verify OTP — MyCards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html {
        height: 100%;
        overflow: hidden;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      html::-webkit-scrollbar {
        display: none;
      }
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        font-family: Inter, system-ui, sans-serif;
        -webkit-tap-highlight-color: transparent;
        scrollbar-width: none;
        -ms-overflow-style: none;
        box-sizing: border-box;
        background: #ffffff;
      }
      body::-webkit-scrollbar {
        display: none;
      }
      /* Numeric keypad: invisible labels — artwork PNG shows digits; avoids ghost text behind hits */
      #keypad-buttons .keypad-key[data-keypad-digit] {
        color: transparent;
        font-size: 0;
        line-height: 0;
        overflow: hidden;
        text-shadow: none;
      }
      /* Phone / tablet (incl. iPad landscape to 1366px): hide Figma keypad; OS keyboard drives #verify-last4-native */
      @media (max-width: 1366px) {
        #card-verify-keyboard {
          display: none !important;
          visibility: hidden !important;
          pointer-events: none !important;
        }
      }
      /* In-layout focus hook: keeps element in the interactive bottom region for mobile keyboard APIs */
      .verify-last4-native-input {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        width: 1px;
        height: 1px;
        margin: 0;
        padding: 0;
        border: 0;
        opacity: 0;
        font-size: 16px;
        pointer-events: none;
        z-index: 60;
      }
      @media (min-width: 1367px) and (pointer: fine) {
        .verify-last4-native-input {
          display: none !important;
        }
      }
      /* Phone shell: full width; height tracks dynamic viewport */
      .frame-root {
        width: 100%;
        max-width: none;
        height: 100dvh;
        overflow: hidden;
      }
      @supports not (height: 100dvh) {
        .frame-root {
          height: 100vh;
          min-height: 100vh;
        }
      }
      /* Top chrome: slides in from above (translateY only — no scale) */
      /* Crop system status row (time / Wi‑Fi / battery); 96px Figma chrome = status + app bar */
      #verify-top-bar {
        --verify-status-bar-h: 48px;
        height: calc(96px - var(--verify-status-bar-h));
        transform: translateY(-100%);
        transition: transform 600ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      #verify-top-bar .verify-top-bar-img {
        top: calc(-1 * var(--verify-status-bar-h));
      }
      #verify-top-bar.verify-top-bar--in {
        transform: translateY(0);
      }
      @media (prefers-reduced-motion: reduce) {
        #verify-top-bar {
          transform: translateY(0);
          transition: none;
        }
      }
      /* WalletFinal animation: start far below, then move to center */
      /* Credit cards: start below the visible frame so they read as rising from the bottom, not beside the wallet */
      .card-layer {
        opacity: 0;
        /* Keep X centered during Y animation; 100dvh ensures off-screen on tall viewports (fixed 1000px was not enough) */
        transform: translateX(-50%) translateY(calc(100dvh + 160px));
        will-change: transform, opacity;
        /* Staggered starts + spring settle (overshoot easing) */
        transition:
          transform 780ms cubic-bezier(0.34, 1.15, 0.55, 1),
          opacity 180ms cubic-bezier(0.2, 0.8, 0.2, 1);
        pointer-events: none;
      }
      @supports not (height: 100dvh) {
        .card-layer {
          transform: translateX(-50%) translateY(calc(100vh + 160px));
        }
      }
      .card-layer.card-in {
        opacity: 1;
        transform: translateX(-50%) translateY(0px);
        pointer-events: auto;
        cursor: pointer;
      }
      /* Card-number overlay aligned to Figma: 3x dot groups + right-side last-4 chip */
      .card-oncard-digits {
        position: absolute;
        left: 28px;
        top: 53%;
        right: auto;
        bottom: auto;
        /* Left anchored from card edge; only keep Y offset */
        transform: translateY(24px);
        box-sizing: border-box;
        min-width: 0;
        width: max-content;
        max-width: none;
        padding: 0;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 17px;
        pointer-events: none;
        z-index: 3;
        opacity: 1;
        transition: opacity 200ms ease;
      }
      .card-oncard-digits--empty {
        opacity: 1;
      }
      .card-oncard-digits__dot-groups {
        display: flex;
        align-items: center;
        gap: 17px;
      }
      .card-oncard-digits__group {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .card-oncard-digits__dot {
        width: 8px;
        height: 8px;
        border-radius: 9999px;
        background: rgba(255, 255, 255, 0.95);
      }
      .card-oncard-digits__last4 {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 68px;
        min-height: 30px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.4);
        background: rgba(0, 0, 0, 0.4);
        padding: 6px 8px;
      }
      .card-oncard-digits__text {
        font-size: 18px;
        font-weight: 400;
        letter-spacing: 2px;
        color: #fff;
        line-height: 1;
        font-variant-numeric: tabular-nums;
        text-shadow: none;
      }
      /* Keep on-card overlay visible through all animation steps */
      .frame-root.verify-float-digits-active .card-oncard-digits {
        opacity: 1 !important;
        visibility: visible;
      }
      #digit-display {
        text-shadow: none;
      }
      /* +110px right vs centered on card (was left-1/2 −translate-x-1/2) */
      #card-verify-digits {
        transform: translateX(calc(-50% + 110px));
      }
      /* “Select any card…” — JS sets top to (stack top − 4px); −100% keeps a 4px gap below text */
      #card-select-text {
        transform: translateX(-50%);
      }
      #card-select-text.card-select-text--above-stack {
        transform: translateX(-50%) translateY(-100%);
      }
      /* “Select any card…”: 24px below final top → slide up + fade in */
      #card-select-text.card-select-text--slide-in {
        transition:
          top 480ms cubic-bezier(0.2, 0.8, 0.2, 1),
          opacity 400ms ease-out;
      }
      /* Last-4 screen: “Enter last 4 digits…” + “Choose Another Card” — slide up from below */
      #card-select-text.verify-entry-copy--slide-in,
      #choose-another-card.verify-entry-copy--slide-in {
        transition:
          top 480ms cubic-bezier(0.2, 0.8, 0.2, 1),
          opacity 400ms ease-out;
      }
      #choose-another-card,
      #add-another-above-stack {
        transform: translateX(-50%);
      }
      /* Above-stack links — top set so control sits CARD_ADD_LINK_GAP px above stack */
      #choose-another-card.choose-another--above-stack,
      #add-another-above-stack.choose-another--above-stack {
        transform: translateX(-50%) translateY(-100%);
      }
      /* Fine-tune per asset — number row / last-4 slot varies slightly */
      #card-millenia .card-oncard-digits {
        left: 28px;
        top: 52.75%;
        transform: translateY(24px);
      }
      #card-infinia .card-oncard-digits {
        left: 28px;
        top: 53%;
      }
      #card-swiggy .card-oncard-digits {
        left: 28px;
        top: 53.25%;
      }
      #card-tanue .card-oncard-digits {
        left: 28px;
        top: 53%;
      }
      /* 105% of prior 344×252.27 artwork size */
      #wallet-final {
        width: calc(344px * 1.05);
        height: calc(252.27px * 1.05);
        max-width: none;
        object-fit: contain;
        transform: translateX(-50%) translateY(-50%) translateY(1000px) scale(0.9);
        transition: transform 700ms cubic-bezier(0.2, 0.8, 0.2, 1), opacity 450ms ease-out;
        opacity: 1;
      }
      #wallet-final.wallet-in {
        /* First animation: move to center + rotation, no scale change yet */
        transform: translateX(-50%) translateY(-50%) translateY(0px) rotate(-10deg) scale(0.85);
      }
      #wallet-final.wallet-resize {
        /* End of first animation: set size to 95% instantly (no animation at middle) */
        transition: none;
        transform: translateX(-50%) translateY(-50%) translateY(0px) rotate(-10deg) scale(0.85);
      }
      #wallet-final.wallet-bottom {
        /* End of second animation: return to 100% size (base scale) */
        transform: translateX(-50%) translateY(-50%) translateY(var(--wallet-delta, 0px)) rotate(0deg)
          scale(0.9);
      }
      /* Slide wallet out of the frame bottom when the Verify CTA is shown */
      #wallet-final.wallet-exit {
        transform: translateX(-50%) translateY(-50%)
          translateY(calc(var(--wallet-delta, 0px) + 520px)) rotate(0deg) scale(0.9);
        opacity: 0;
        transition: transform 600ms cubic-bezier(0.2, 0.8, 0.2, 1), opacity 450ms ease-out;
        pointer-events: none;
      }
      /* Post–Verify CTA: wallet starts below seated position, then rises with cards */
      #wallet-final.wallet-rise-start {
        transform: translateX(-50%) translateY(-50%)
          translateY(calc(var(--wallet-delta, 0px) + 420px)) rotate(0deg) scale(0.9);
        opacity: 1;
        transition: none;
        pointer-events: none;
      }
      /* Post–final-stack card pick: wallet exits downward */
      #wallet-final.wallet-drop-away {
        transform: translateX(-50%) translateY(-50%)
          translateY(calc(var(--wallet-delta, 0px) + 820px)) rotate(0deg) scale(0.9);
        opacity: 0;
        transition: transform 750ms cubic-bezier(0.2, 0.8, 0.2, 1), opacity 550ms ease-out;
        pointer-events: none;
      }
      #verify-success-toast {
        transition: opacity 220ms ease-out;
      }
      #verify-success-toast .verify-success-toast__backdrop {
        opacity: 0;
        transition: opacity 220ms ease-out;
      }
      #verify-success-toast .verify-success-toast__sheet {
        transform: translateY(100%);
        transition: transform 320ms cubic-bezier(0.2, 0.8, 0.2, 1);
        will-change: transform;
      }
      #verify-success-toast.verify-success-toast--open .verify-success-toast__backdrop {
        opacity: 1;
      }
      #verify-success-toast.verify-success-toast--open .verify-success-toast__sheet {
        transform: translateY(0);
      }
      @media (prefers-reduced-motion: reduce) {
        #verify-success-toast .verify-success-toast__sheet {
          transition: none;
        }
        #verify-success-toast .verify-success-toast__backdrop {
          transition: none;
        }
      }
      /* Same 4px top edge as login / OTP sheets (index.html) */
      .verify-success-toast__sheet-top-gradient {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        height: 4px;
        z-index: 1;
        border-radius: 24px 24px 0 0;
        background: linear-gradient(90deg, #ffb6ba 0%, #1c3fca 50%, #ffb1b6 100%);
      }
      .verify-success-icon {
        width: 40px;
        height: 40px;
        border-radius: 9999px;
        background: #16a34a;
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        line-height: 1;
        font-weight: 700;
      }
    </style>
    <script>
      tailwind.config = {

        },
      };
    </script>
  </head>

      >

      <div

      >
        <div class="verify-success-toast__backdrop absolute inset-0 bg-black/25" aria-hidden="true"></div>
        <div
          class="verify-success-toast__sheet relative w-full min-h-[212px] overflow-hidden rounded-t-[24px] bg-white pt-8 px-6 pb-10 shadow-[0_-8px_24px_rgba(0,0,0,0.12)] flex flex-col items-center text-center"

        >

      <!-- Last-4 digits display (floating strip + .card-oncard-digits on each card; see CSS + DIGITS_* in script) -->
      <div

        <span
          id="digit-display"

        ></span>
      </div>

      <!-- Native OS keyboard at viewport ≤1366px (phones + tablets); desktop uses #card-verify-keyboard -->
      <input
        type="tel"
        id="verify-last4-native"
        class="verify-last4-native-input"
        inputmode="numeric"
        pattern="[0-9]*"
        maxlength="4"
        autocomplete="one-time-code"
        enterkeyhint="done"
        aria-label="Last 4 digits of card"
        tabindex="-1"
      />

      <!-- 4-digit keypad for last-4 verification (desktop) -->
      <div
        id="card-verify-keyboard"
        class="absolute left-0 right-0 bottom-0 z-[40] w-full h-[306.26px] overflow-hidden opacity-0 pointer-events-none translate-y-0 transition-[opacity,transform] duration-300 ease-out"
        aria-hidden="true"
      >
        <div class="relative w-full h-[306.26px]">
          <!-- Exact Figma keyboard image -->
          <div class="absolute inset-0 overflow-hidden pointer-events-none">
            <img
              alt=""
              draggable="false"
              src="assets/c75674c7c7e4e495d6fde5f372e8f51eb6c6f772.png"
              class="absolute left-0 w-full max-w-none"
              style="height: 254.84%; top: -154.84%;"
            />
          </div>

          <!-- Keypad: 1–9, 0, Back + Done — invisible hit targets (opacity-0); bitmap shows underneath. -->
          <div class="absolute inset-0">
            <div
              id="keypad-buttons"
              class="absolute left-[12px] right-[12px] top-[38px] grid grid-cols-3 grid-rows-4 gap-x-[10px] gap-y-[10px] z-[1] touch-manipulation opacity-0"
              role="group"
              aria-label="Numeric keypad"
            >
              <button type="button" class="keypad-key min-h-[54px] w-full rounded-[10px] bg-white text-[22px] font-medium text-neutral-900 shadow-sm border border-neutral-200/90 cursor-pointer select-none active:scale-[0.98] transition-transform" data-keypad-digit="1" aria-label="1"></button>
              <button type="button" class="keypad-key min-h-[54px] w-full rounded-[10px] bg-white text-[22px] font-medium text-neutral-900 shadow-sm border border-neutral-200/90 cursor-pointer select-none active:scale-[0.98] transition-transform" data-keypad-digit="2" aria-label="2"></button>
              <button type="button" class="keypad-key min-h-[54px] w-full rounded-[10px] bg-white text-[22px] font-medium text-neutral-900 shadow-sm border border-neutral-200/90 cursor-pointer select-none active:scale-[0.98] transition-transform" data-keypad-digit="3" aria-label="3"></button>
              <button type="button" class="keypad-key min-h-[54px] w-full -translate-y-[20px] rounded-[10px] bg-white text-[22px] font-medium text-neutral-900 shadow-sm border border-neutral-200/90 cursor-pointer select-none active:scale-[0.98] transition-transform" data-keypad-digit="4" aria-label="4"></button>
              <button type="button" class="keypad-key min-h-[54px] w-full -translate-y-[20px] rounded-[10px] bg-white text-[22px] font-medium text-neutral-900 shadow-sm border border-neutral-200/90 cursor-pointer select-none active:scale-[0.98] transition-transform" data-keypad-digit="5" aria-label="5"></button>
              <button type="button" class="keypad-key min-h-[54px] w-full -translate-y-[20px] rounded-[10px] bg-white text-[22px] font-medium text-neutral-900 shadow-sm border border-neutral-200/90 cursor-pointer select-none active:scale-[0.98] transition-transform" data-keypad-digit="6" aria-label="6"></button>
              <button type="button" class="keypad-key min-h-[54px] w-full -translate-y-[40px] rounded-[10px] bg-white text-[22px] font-medium text-neutral-900 shadow-sm border border-neutral-200/90 cursor-pointer select-none active:scale-[0.98] transition-transform" data-keypad-digit="7" aria-label="7"></button>
              <button type="button" class="keypad-key min-h-[54px] w-full -translate-y-[40px] rounded-[10px] bg-white text-[22px] font-medium text-neutral-900 shadow-sm border border-neutral-200/90 cursor-pointer select-none active:scale-[0.98] transition-transform" data-keypad-digit="8" aria-label="8"></button>
              <button type="button" class="keypad-key min-h-[54px] w-full -translate-y-[40px] rounded-[10px] bg-white text-[22px] font-medium text-neutral-900 shadow-sm border border-neutral-200/90 cursor-pointer select-none active:scale-[0.98] transition-transform" data-keypad-digit="9" aria-label="9"></button>
              <div class="min-h-[54px] w-full pointer-events-none select-none" aria-hidden="true"></div>
              <button type="button" class="keypad-key min-h-[54px] w-full -translate-y-[48px] rounded-[10px] bg-white text-[22px] font-medium text-neutral-900 shadow-sm border border-neutral-200/90 cursor-pointer select-none active:scale-[0.98] transition-transform" data-keypad-digit="0" aria-label="0"></button>
              <button
                type="button"
                id="keypad-back-space"
                class="min-h-[54px] w-full -translate-y-[48px] rounded-[10px] bg-white flex items-center justify-center border border-neutral-200/90 shadow-sm cursor-pointer touch-manipulation select-none active:scale-[0.98] transition-transform"
                aria-label="Backspace"
              >
                <img
                  src="assets/keypad-backspace.png"
                  alt=""
                  width="28"
                  height="28"
                  draggable="false"
                  class="pointer-events-none object-contain select-none max-h-[28px] max-w-[40px]"
                />
              </button>
            </div>

            <!-- Done CTA hotspot -->
            <button
              type="button"
              id="keyboard-done"
              class="absolute right-[6px] top-[4px] z-[2] w-[70px] h-[30px] opacity-0 bg-transparent border-0 p-0 cursor-pointer"
              aria-label="Done"
            ></button>
          </div>
        </div>
      </div>

      <img
        src="assets/wallet-final.png"
        alt=""
        draggable="false"
        id="wallet-final"
        class="absolute left-1/2 top-1/2 pointer-events-none select-none z-[10]"
        width="361"
        height="265"
      />
    </div>
    <script>
      // Start wallet slide-up animation on load
      (function () {
        var el = document.getElementById("wallet-final");
        var topBar = document.getElementById("verify-top-bar");
        function revealVerifyTopBar() {
          if (!topBar) return;
          if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
            topBar.classList.add("verify-top-bar--in");
            return;
          }
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              topBar.classList.add("verify-top-bar--in");
            });
          });
        }
        revealVerifyTopBar();
        var infoLayer = document.getElementById("info-layer");
        var infoLayerTitle = document.getElementById("info-layer-title");
        var infoLayerSubtext = document.getElementById("info-layer-subtext");
        var cardSelectText = document.getElementById("card-select-text");
        var chooseAnotherCard = document.getElementById("choose-another-card");
        var infoLayerAddCard = document.getElementById("info-layer-add-card");
        var addAnotherAboveStack = document.getElementById("add-another-above-stack");
        var verifyCardCta = document.getElementById("verify-card-cta");
        var verifySuccessToast = document.getElementById("verify-success-toast");
        var keyboard = document.getElementById("card-verify-keyboard");
        var keyboardDone = document.getElementById("keyboard-done");
        var verifyLast4Native = document.getElementById("verify-last4-native");
        var digitsWrap = document.getElementById("card-verify-digits");
        var frameShell = document.querySelector(".frame-root");
        /** Matches CSS: phones / tablets use native keypad; avoids double dismiss without keyboard translate class */
        var verifyDismissInProgress = false;
        var VERIFY_NATIVE_KB_MEDIA = "(max-width: 1366px)";
        var verifyNativeKbMql =
          typeof window.matchMedia === "function"
            ? window.matchMedia(VERIFY_NATIVE_KB_MEDIA)
            : { matches: false, addEventListener: function () {}, addListener: function () {} };

        function useNativeVerifyKeypad() {
          return verifyNativeKbMql.matches;
        }

        function syncNativeInputFromDigits() {
          if (!verifyLast4Native || !useNativeVerifyKeypad()) return;
          var v = enteredDigits.join("");
          if (verifyLast4Native.value !== v) {
            verifyLast4Native.value = v;
          }
        }

        function focusVerifyNativeInput() {
          if (!verifyLast4Native || !useNativeVerifyKeypad() || !isVerifying) return;
          verifyLast4Native.removeAttribute("readonly");
          verifyLast4Native.setAttribute("tabindex", "0");
          verifyLast4Native.value = enteredDigits.join("");
          try {
            verifyLast4Native.focus({ preventScroll: true });
          } catch (e) {
            verifyLast4Native.focus();
          }
          try {
            verifyLast4Native.click();
          } catch (eClick) {}
          try {
            var len = verifyLast4Native.value.length;
            verifyLast4Native.setSelectionRange(len, len);
          } catch (e2) {}
        }

        function scheduleFocusVerifyNativeInput() {
          if (!verifyLast4Native || !useNativeVerifyKeypad() || !isVerifying) return;
          focusVerifyNativeInput();
          window.setTimeout(function () {
            if (!isVerifying || !useNativeVerifyKeypad()) return;
            focusVerifyNativeInput();
          }, 280);
          window.setTimeout(function () {
            if (!isVerifying || !useNativeVerifyKeypad()) return;
            focusVerifyNativeInput();
          }, 520);
        }

        function blurVerifyNativeInput() {
          if (!verifyLast4Native) return;
          verifyLast4Native.blur();
          verifyLast4Native.setAttribute("tabindex", "-1");
          verifyLast4Native.value = "";
        }
        function setFloatingDigitStripActive(on) {
          if (frameShell) frameShell.classList.toggle("verify-float-digits-active", !!on);
        }
        var cards = [
          document.getElementById("card-infinia"),
          document.getElementById("card-tanue"),
          document.getElementById("card-swiggy"),
          document.getElementById("card-millenia"),
        ];
        /* Slugs for card_details.html?card=… (same order as cards[]). */
        var CARD_SLUGS = ["infinia", "tanue", "swiggy", "millenia"];
        var isVerifying = false;
        var activeCard = null;
        var enteredDigits = [];
        var postVerifyFinalStack = false;
        var postVerifyFinalPickDone = false;
        var lastVerifiedStackIndex = -1;
        /* Post–verify pick: selected card animates to this top (px) and scale. */
        var FINAL_PICK_TOP_PX = 80;
        /* digit strip sits this far below the active card’s top (px); same offset after Done */
        var DIGITS_TOP_OFFSET = 118;
        var VERIFY_INPUT_LIFT_PX = 80;
        var CARD_TOP_KEYBOARD_BASE = 280;
        var CARD_TOP_KEYBOARD = CARD_TOP_KEYBOARD_BASE - VERIFY_INPUT_LIFT_PX;
        var CARD_TOP_AFTER_DONE = 440;
        var CARD_SELECT_VERIFY_TOP_BASE = 228;
        var CHOOSE_ANOTHER_VERIFY_TOP_BASE = 258;
        var INFO_LAYER_VERIFY_TOP_BASE = -78;
        var DIGITS_LEFT = "50%";
        var CARD_MOVE_EASE = "top 600ms cubic-bezier(0.2, 0.8, 0.2, 1)";
        /* Fallback tops before wallet reaches .wallet-bottom (no-js / first paint) */
        var CARD_STACK_TOPS_PX = [292, 343, 394, 445];
        var CARD_STACK_GAP = 51;
        /* Y of topmost card in stack = (wallet img top in frame) − this (see getWalletTopInFrame) */
        var CARD_STACK_OFFSET_ABOVE_WALLET = 210;
        /* Vertical gap between hint / above-stack link bottom and top-of-stack (px) */
        var CARD_SELECT_GAP_ABOVE_STACK = 2;
        var CARD_ADD_LINK_GAP_ABOVE_STACK = 4;
        var STACK_RETURN_RISE_PX = 400;
        var STACK_RETURN_ANIM_MS = 900;
        var INFO_TITLE_VERIFY = "Let’s Verify if It’s You";
        var INFO_TITLE_STACK = "We have added all these cards";
        var FINAL_PICK_ANIM_MS = 600;
        var CARD_SELECT_VERIFY_TOP = CARD_SELECT_VERIFY_TOP_BASE - VERIFY_INPUT_LIFT_PX;
        var CHOOSE_ANOTHER_VERIFY_TOP = CHOOSE_ANOTHER_VERIFY_TOP_BASE - VERIFY_INPUT_LIFT_PX;
        var INFO_LAYER_VERIFY_TOP = INFO_LAYER_VERIFY_TOP_BASE - VERIFY_INPUT_LIFT_PX;
        var POST_INPUT_SHIFT_UP_PX = 60;
        var VERIFY_SUCCESS_MS = 2000;
        var VERIFY_SUCCESS_SHEET_MS = 320;
        var isVerifySuccessShowing = false;

        function getWalletTopInFrame() {
          if (!frameShell || !el) return 0;
          var f = frameShell.getBoundingClientRect();
          var w = el.getBoundingClientRect();
          return w.top - f.top;
        }

        function getStackTopsPx() {
          if (!el || !el.classList.contains("wallet-bottom")) {
            return CARD_STACK_TOPS_PX.slice();
          }
          var walletTop = getWalletTopInFrame();
          var base = walletTop - CARD_STACK_OFFSET_ABOVE_WALLET;
          var out = [];
          for (var si = 0; si < cards.length; si++) {
            out.push(base + si * CARD_STACK_GAP);
          }
          return out;
        }

        function syncCardSelectStackHint(stackBaseTopPx) {
          if (!cardSelectText) return;
          if (isVerifying || postVerifyFinalStack) return;
          /* Don’t snap `top` while the hint is mid–slide-in (inline transition:none priming + rAF). */
          if (cardSelectText.classList.contains("card-select-text--slide-in")) return;
          cardSelectText.classList.add("card-select-text--above-stack");
          cardSelectText.style.top = stackBaseTopPx - CARD_SELECT_GAP_ABOVE_STACK + "px";
        }

        /** Start this many px *below* final `top` (larger top value), then slide up into place */
        var CARD_SELECT_HINT_SLIDE_FROM_BELOW_PX = 24;
        function animateCardSelectHintReveal() {
          if (!cardSelectText) return;
          if (isVerifying || postVerifyFinalStack) return;
          if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
            cardSelectText.textContent = "Select any card to verify";
            cardSelectText.classList.add("card-select-text--above-stack");
            cardSelectText.style.color = "";
            cardSelectText.style.fontWeight = "";
            cardSelectText.style.fontSize = "";
            cardSelectText.style.top =
              getStackBaseTopPx() - CARD_SELECT_GAP_ABOVE_STACK + "px";
            cardSelectText.classList.remove("opacity-0");
            cardSelectText.classList.add("opacity-100");
            cardSelectText.removeAttribute("aria-hidden");
            return;
          }

          var finalTop = getStackBaseTopPx() - CARD_SELECT_GAP_ABOVE_STACK;
          var startTop = finalTop + CARD_SELECT_HINT_SLIDE_FROM_BELOW_PX;

          cardSelectText.textContent = "Select any card to verify";
          cardSelectText.classList.add("card-select-text--above-stack");
          cardSelectText.style.color = "";
          cardSelectText.style.fontWeight = "";
          cardSelectText.style.fontSize = "";
          cardSelectText.classList.remove("card-select-text--slide-in");
          cardSelectText.style.transition = "none";
          cardSelectText.style.top = startTop + "px";
          cardSelectText.classList.add("opacity-0");
          cardSelectText.classList.remove("opacity-100");
          void cardSelectText.offsetHeight;

          cardSelectText.classList.add("card-select-text--slide-in");
          /* Inline `transition: none` beats the stylesheet; remove it so slide-in CSS can run. */
          cardSelectText.style.removeProperty("transition");

          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              cardSelectText.classList.remove("opacity-0");
              cardSelectText.classList.add("opacity-100");
              cardSelectText.removeAttribute("aria-hidden");
              cardSelectText.style.top = finalTop + "px";
            });
          });

          window.setTimeout(function () {
            if (!cardSelectText) return;
            cardSelectText.classList.remove("card-select-text--slide-in");
            cardSelectText.style.removeProperty("transition");
          }, 550);
        }

        var VERIFY_ENTRY_COPY_SLIDE_PX = 400;
        function animateVerifyEntryCopy() {
          var labelFinal = CARD_SELECT_VERIFY_TOP;
          var chooseFinal = CHOOSE_ANOTHER_VERIFY_TOP;
          if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
            if (cardSelectText) {
              cardSelectText.style.top = labelFinal + "px";
              cardSelectText.classList.remove("opacity-0");
              cardSelectText.classList.add("opacity-100");
              cardSelectText.removeAttribute("aria-hidden");
            }
            if (chooseAnotherCard) {
              chooseAnotherCard.style.top = chooseFinal + "px";
              chooseAnotherCard.classList.remove("opacity-0", "pointer-events-none");
              chooseAnotherCard.classList.add("opacity-100", "pointer-events-auto");
            }
            return;
          }
          if (cardSelectText) {
            cardSelectText.classList.remove("verify-entry-copy--slide-in");
            cardSelectText.style.transition = "none";
            cardSelectText.style.top = labelFinal + VERIFY_ENTRY_COPY_SLIDE_PX + "px";
            cardSelectText.classList.add("opacity-0");
            cardSelectText.classList.remove("opacity-100");
          }
          if (chooseAnotherCard) {
            chooseAnotherCard.classList.remove("verify-entry-copy--slide-in");
            chooseAnotherCard.style.transition = "none";
            chooseAnotherCard.style.top = chooseFinal + VERIFY_ENTRY_COPY_SLIDE_PX + "px";
            chooseAnotherCard.classList.add("opacity-0", "pointer-events-none");
            chooseAnotherCard.classList.remove("opacity-100", "pointer-events-auto");
          }
          void (cardSelectText && cardSelectText.offsetHeight);

          if (cardSelectText) {
            cardSelectText.classList.add("verify-entry-copy--slide-in");
            cardSelectText.style.removeProperty("transition");
          }
          if (chooseAnotherCard) {
            chooseAnotherCard.classList.add("verify-entry-copy--slide-in");
            chooseAnotherCard.style.removeProperty("transition");
          }

          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              if (cardSelectText) {
                cardSelectText.classList.remove("opacity-0");
                cardSelectText.classList.add("opacity-100");
                cardSelectText.removeAttribute("aria-hidden");
                cardSelectText.style.top = labelFinal + "px";
              }
              if (chooseAnotherCard) {
                chooseAnotherCard.classList.remove("opacity-0", "pointer-events-none");
                chooseAnotherCard.classList.add("opacity-100", "pointer-events-auto");
                chooseAnotherCard.style.top = chooseFinal + "px";
              }
            });
          });

          window.setTimeout(function () {
            if (cardSelectText) {
              cardSelectText.classList.remove("verify-entry-copy--slide-in");
              cardSelectText.style.removeProperty("transition");
            }
            if (chooseAnotherCard) {
              chooseAnotherCard.classList.remove("verify-entry-copy--slide-in");
              chooseAnotherCard.style.removeProperty("transition");
            }
          }, 550);
        }

        function getStackBaseTopPx() {
          if (!el || !frameShell || !el.classList.contains("wallet-bottom")) {
            return CARD_STACK_TOPS_PX[0];
          }
          return getWalletTopInFrame() - CARD_STACK_OFFSET_ABOVE_WALLET;
        }

        function hidePostVerifyAddCardChrome() {
          if (infoLayerAddCard) {
            infoLayerAddCard.classList.add("hidden");
            infoLayerAddCard.classList.add("opacity-0", "pointer-events-none");
            infoLayerAddCard.classList.remove("opacity-100", "pointer-events-auto");
          }
          if (addAnotherAboveStack) {
            addAnotherAboveStack.classList.remove("choose-another--above-stack");
            addAnotherAboveStack.style.top = "";
            addAnotherAboveStack.classList.add("opacity-0", "pointer-events-none");
            addAnotherAboveStack.classList.remove("opacity-100", "pointer-events-auto");
          }
        }

        function setCardOverlaysVisible(visible) {
          var overlays = document.querySelectorAll(".card-oncard-digits");
          for (var oi = 0; oi < overlays.length; oi++) {
            var ov = overlays[oi];
            if (!ov) continue;
            if (visible) {
              ov.style.opacity = "";
              ov.style.visibility = "";
            } else {
              ov.style.opacity = "0";
              ov.style.visibility = "hidden";
            }
          }
        }

        function syncAddAnotherAboveStack(optStackBaseTopPx) {
          if (!addAnotherAboveStack) return;
          var base =
            optStackBaseTopPx != null && !isNaN(parseFloat(optStackBaseTopPx, 10))
              ? parseFloat(optStackBaseTopPx, 10)
              : getStackBaseTopPx();
          if (isNaN(base)) return;
          addAnotherAboveStack.classList.add("choose-another--above-stack");
          addAnotherAboveStack.style.top = base - CARD_ADD_LINK_GAP_ABOVE_STACK + "px";
        }

        function applyCardStackTops(opts) {
          opts = opts || {};
          if (!frameShell || !el) return;
          if (!el.classList.contains("wallet-bottom")) return;
          if (isVerifying) return;
          if (postVerifyFinalPickDone) return;
          var walletTop = getWalletTopInFrame();
          var base = walletTop - CARD_STACK_OFFSET_ABOVE_WALLET;
          for (var si = 0; si < cards.length; si++) {
            if (!cards[si]) continue;
            cards[si].style.top = base + si * CARD_STACK_GAP + "px";
          }
          if (!opts.skipCardSelectHint) {
            syncCardSelectStackHint(base);
          }
          if (postVerifyFinalStack) {
            syncAddAnotherAboveStack();
          }
        }

        function onWalletBottomSettled() {
          if (!el || !frameShell) return;
          if (!el.classList.contains("wallet-bottom")) return;
          applyCardStackTops();
        }

        function cardDetailsHref(stackIdx) {
          var slug = CARD_SLUGS[stackIdx] || "swiggy";
          return "card.html?card=" + encodeURIComponent(slug);
        }

        function restoreInfoLayerVerifyCopy() {
          if (infoLayerTitle) infoLayerTitle.textContent = INFO_TITLE_VERIFY;
          if (infoLayerSubtext) infoLayerSubtext.classList.remove("hidden");
          hidePostVerifyAddCardChrome();
        }

        function stackIndexOfCard(cardEl) {
          for (var si = 0; si < cards.length; si++) {
            if (cards[si] === cardEl) return si;
          }
          return -1;
        }

        function syncDigitsWrapToActiveCard() {
          if (!digitsWrap || !activeCard) return;
          var raw = activeCard.style.top;
          var t = parseFloat(raw, 10);
          if (isNaN(t)) {
            t = parseFloat(getComputedStyle(activeCard).top, 10);
          }
          if (isNaN(t)) return;
          digitsWrap.style.top = t + DIGITS_TOP_OFFSET + "px";
        }

        function renderDigits() {
          var text = enteredDigits.join("");
          var display = document.getElementById("digit-display");
          if (display) display.textContent = text;
          var onCardWraps = document.querySelectorAll(".card-oncard-digits");
          for (var oc = 0; oc < onCardWraps.length; oc++) {
            var wrap = onCardWraps[oc];
            var span = wrap.querySelector(".card-oncard-digits__text");
            if (span) span.textContent = text;
            if (enteredDigits.length === 0) {
              wrap.classList.add("card-oncard-digits--empty");
            } else {
              wrap.classList.remove("card-oncard-digits--empty");
            }
          }
          if (keyboardDone) {
            var complete = enteredDigits.length === 4;
            keyboardDone.disabled = !complete;
            keyboardDone.setAttribute("aria-disabled", complete ? "false" : "true");
          }
        }

            stackTopsReturn = [];
            for (var sm = 0; sm < cards.length; sm++) {
              stackTopsReturn.push(stackBaseMeas + sm * CARD_STACK_GAP);
            }
            el.classList.remove("wallet-bottom");
            el.classList.add("wallet-rise-start");
            el.style.transition = walletPrevTransition || "";
            void el.offsetHeight;
          } else {
            stackTopsReturn = getStackTopsPx();
          }

          if (keyboard) {
            keyboard.classList.add("opacity-0", "pointer-events-none", "translate-y-0");
            keyboard.classList.remove("opacity-100", "pointer-events-auto", "translate-y-[320px]");
            keyboard.setAttribute("aria-hidden", "true");
          }
          if (digitsWrap) {
            digitsWrap.classList.add("pointer-events-none", "opacity-0");
            digitsWrap.classList.remove("opacity-100");
            digitsWrap.setAttribute("aria-hidden", "true");
            digitsWrap.style.transition = "opacity 220ms ease-out";
            digitsWrap.style.opacity = "0";
            setFloatingDigitStripActive(false);
            window.setTimeout(function () {
              if (digitsWrap) {
                digitsWrap.style.top = "";
                digitsWrap.style.left = "";
                digitsWrap.style.transition = "";
                digitsWrap.style.zIndex = "";
              }
            }, 240);
          }
          if (verifyCardCta) {
            verifyCardCta.classList.add("opacity-0", "pointer-events-none");
            verifyCardCta.classList.remove("opacity-100", "pointer-events-auto");
          }

          if (infoLayer) {
            infoLayer.style.top = "";
            infoLayer.classList.remove("top-1/2", "-translate-y-1/2", "opacity-0");
            infoLayer.classList.add("top-[92px]", "-translate-y-0", "opacity-100");
          }
          if (infoLayerTitle) {
            infoLayerTitle.textContent = INFO_TITLE_STACK;
          }
          if (infoLayerSubtext) {
            infoLayerSubtext.classList.add("hidden");
          }
          if (cardSelectText) {
            cardSelectText.textContent = "";
            cardSelectText.style.top = "";
            cardSelectText.style.color = "";
            cardSelectText.style.fontWeight = "";
            cardSelectText.style.fontSize = "";
            cardSelectText.classList.add("opacity-0", "pointer-events-none");
            cardSelectText.classList.remove("opacity-100");
            cardSelectText.setAttribute("aria-hidden", "true");
          }
          if (chooseAnotherCard) {
            chooseAnotherCard.textContent = "Choose Another Card";
            chooseAnotherCard.classList.remove("choose-another--above-stack");
            chooseAnotherCard.style.top = "";
            chooseAnotherCard.classList.add("opacity-0", "pointer-events-none");
            chooseAnotherCard.classList.remove("opacity-100", "pointer-events-auto");
          }
          if (infoLayerAddCard) {
            infoLayerAddCard.textContent = "Add Another Card";
            infoLayerAddCard.classList.remove("hidden");
            infoLayerAddCard.classList.remove("opacity-0", "pointer-events-none");
            infoLayerAddCard.classList.add("opacity-100", "pointer-events-auto");
          }
          if (addAnotherAboveStack) {
            addAnotherAboveStack.textContent = "Select Card to Continue";
            syncAddAnotherAboveStack(stackTopsReturn[0]);
            addAnotherAboveStack.classList.remove("opacity-0", "pointer-events-none");
            addAnotherAboveStack.classList.add("opacity-100", "pointer-events-auto");
          }

          for (var i = 0; i < cards.length; i++) {
            var c = cards[i];
            if (!c) continue;
            var stackTop = stackTopsReturn[i];
            c.style.pointerEvents = "none";
            c.style.zIndex = "";
            c.style.transition = "none";

            if (i === activeIdx) {
              var fromTop = parseFloat(getComputedStyle(c).top, 10);
              if (isNaN(fromTop)) fromTop = CARD_TOP_AFTER_DONE;
              c.style.top = fromTop + "px";
              c.style.opacity = "1";
              c.style.transform = "translateX(-50%) translateY(0)";
            } else {
              c.style.top = stackTop + "px";
              c.style.opacity = "0";
              c.style.transform =
                "translateX(-50%) translateY(" + STACK_RETURN_RISE_PX + "px)";
            }
          }
          void (cards[0] && cards[0].offsetHeight);

          /* Prime transition, then apply end state on a later frame — same-frame transition+value often skips interpolation */
          function primeStackReturnTransitions() {
            for (var j = 0; j < cards.length; j++) {
              var cj = cards[j];
              if (!cj) continue;
              if (j === activeIdx) {
                cj.style.transition =
                  "top " + stackMs + "ms " + stackEase + ", transform " + stackMs + "ms " + stackEase;
              } else {
                cj.style.transition =
                  "transform " +
                  stackMs +
                  "ms " +
                  stackEase +
                  ", opacity " +
                  stackMs +
                  "ms " +
                  stackEase;
              }
            }
            void (cards[0] && cards[0].offsetHeight);
          }

          function applyStackReturnEndStateAndWallet() {
            if (el) {
              el.style.transition =
                "transform " + stackMs + "ms " + stackEase;
              el.classList.remove("wallet-rise-start");
              el.classList.add("wallet-bottom");
              window.setTimeout(function () {
                if (el) el.style.transition = "";
              }, stackMs);
            }
            for (var j = 0; j < cards.length; j++) {
              var cj = cards[j];
              if (!cj) continue;
              var stackTopJ = stackTopsReturn[j];
              cj.style.top = stackTopJ + "px";
              cj.style.transform = "translateX(-50%) translateY(0)";
              cj.style.opacity = "1";
              cj.style.zIndex = "";
            }
            if (el) el.style.zIndex = "";
          }

          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              primeStackReturnTransitions();
              requestAnimationFrame(applyStackReturnEndStateAndWallet);
            });
          });

          window.setTimeout(function () {
            postVerifyFinalStack = true;
            setCardOverlaysVisible(false);
            for (var k = 0; k < cards.length; k++) {
              var ck = cards[k];
              if (!ck) continue;
              ck.style.transition = "";
              ck.style.transitionDelay = "";
              ck.style.pointerEvents = "auto";
              ck.style.cursor = "pointer";
              ck.style.zIndex = "";
            }
            applyCardStackTops();
          }, stackMs + 120);
        }

        // Card click handlers: all cards clickable; after Verify → final stack, any card runs pick-up + card_details navigation.
        for (var i = 0; i < cards.length; i++) {
          (function (idx) {
            var c = cards[idx];
            if (!c) return;
            c.addEventListener("click", function () {
              if (postVerifyFinalStack) {
                animateFinalStackPick(idx);
                return;
              }
              startCardVerifyForCard(c);
            });
          })(i);
        }

        var keypadButtons = document.getElementById("keypad-buttons");
        if (keypadButtons) {
          keypadButtons.addEventListener("click", function (e) {
            if (!isVerifying || useNativeVerifyKeypad()) return;
            var target = e.target;
            if (!target || !target.closest) return;
            if (target.closest("#keypad-back-space")) {
              keypadRemoveLastDigit();
              return;
            }
            var digitBtn = target.closest("button[data-keypad-digit]");
            if (digitBtn) {
              var d = digitBtn.getAttribute("data-keypad-digit");
              if (d === null || d === "") return;
              appendDigit(d);
            }
          });
        }

        document.addEventListener("keydown", function (e) {
          if (!isVerifying) return;
          if (useNativeVerifyKeypad()) {
            return;
          }
          if (!keyboard || keyboard.classList.contains("opacity-0")) return;
          if (e.key === "Backspace" || e.key === "Delete") {
            e.preventDefault();
            keypadRemoveLastDigit();
            return;
          }
          if (/^[0-9]$/.test(e.key)) {
            e.preventDefault();
            appendDigit(e.key);
          }
        });

        if (verifyLast4Native) {
          verifyLast4Native.addEventListener("input", function () {
            if (!isVerifying || !useNativeVerifyKeypad()) return;
            var v = this.value.replace(/\D/g, "").slice(0, 4);
            if (this.value !== v) {
              this.value = v;
            }
            enteredDigits = v.split("");
            renderDigits();
            if (v.length === 4) {
              dismissKeyboardAndMoveContentDown();
            }
          });
        }

        if (chooseAnotherCard) {
          chooseAnotherCard.addEventListener("click", function () {
            if (isVerifying) {
              animateReturnToStackFromChooseAnother();
              return;
            }
          });
        }
        if (verifyCardCta) {
          verifyCardCta.addEventListener("click", function () {
            if (isVerifySuccessShowing) return;
            isVerifySuccessShowing = true;
            if (verifySuccessToast) {
              verifySuccessToast.classList.remove("opacity-0", "pointer-events-none");
              verifySuccessToast.classList.add("opacity-100");
              verifySuccessToast.setAttribute("aria-hidden", "false");
              requestAnimationFrame(function () {
                requestAnimationFrame(function () {
                  if (verifySuccessToast) verifySuccessToast.classList.add("verify-success-toast--open");
                });
              });
            }
            window.setTimeout(function () {
              if (verifySuccessToast) {
                verifySuccessToast.classList.remove("verify-success-toast--open");
              }
              window.setTimeout(function () {
                if (verifySuccessToast) {
                  verifySuccessToast.classList.add("opacity-0", "pointer-events-none");
                  verifySuccessToast.classList.remove("opacity-100");
                  verifySuccessToast.setAttribute("aria-hidden", "true");
                }
                isVerifySuccessShowing = false;
                returnToStackAfterVerify();
              }, VERIFY_SUCCESS_SHEET_MS);
            }, VERIFY_SUCCESS_MS);
          });
        }
        if (keyboardDone) {
          keyboardDone.addEventListener("click", function () {
            if (enteredDigits.length !== 4) return;
            dismissKeyboardAndMoveContentDown();
          });
        }
        if (!el) return;
        var WALLET_FIRST_ANIM_MS = 700;
        var WALLET_AFTER_FIRST_PAUSE_MS = 600;
        var WALLET_TO_BOTTOM_ANIM_MS = 700;
        var CARDS_AFTER_WALLET_MS = 100;
        var CARD_IN_ANIM_MS = 780;
        var CARD_STAGGER_MS = 190;
        // Ensure initial styles are applied before animating
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            el.classList.add("wallet-in");
          });
        });

        // After the first animation ends, set the size to 95% instantly (no middle scaling animation).
        setTimeout(function () {
          el.classList.add("wallet-resize");
        }, WALLET_FIRST_ANIM_MS + 20);

        // First motion (wallet-in) completes in WALLET_FIRST_ANIM_MS; pause WALLET_AFTER_FIRST_PAUSE_MS, then move wallet to bottom.
        setTimeout(function () {
          if (infoLayer) {
            infoLayer.classList.remove("opacity-0");
            infoLayer.classList.add("opacity-100");
          }
          var rect = el.getBoundingClientRect();
          var h = rect.height || 0;
          var frameH = frameShell ? frameShell.getBoundingClientRect().height : window.innerHeight;
          // Wallet is centered vertically (top:50% + translateY(-50%)). Move so it sits near frame bottom.
          // Push an extra +200px down from the bottom-aligned position, then move 25px up.
          var delta = frameH / 2 - h / 2 + 200 - 25;
          el.style.setProperty("--wallet-delta", delta + "px");
          el.classList.remove("wallet-in");
          el.classList.remove("wallet-resize");
          el.classList.add("wallet-bottom");
          window.setTimeout(onWalletBottomSettled, WALLET_TO_BOTTOM_ANIM_MS + 40);
        }, WALLET_FIRST_ANIM_MS + WALLET_AFTER_FIRST_PAUSE_MS);

        // Cards pop out 100ms after the wallet finishes moving to the bottom (700ms transform on #wallet-final).
        setTimeout(
          function () {
          if (infoLayer) {
            setTimeout(function () {
              infoLayer.classList.remove("top-1/2", "-translate-y-1/2");
              infoLayer.classList.add("top-[92px]", "-translate-y-0");
            }, 300);
          }
          var lastCardIndex = -1;
          for (var ci = 0; ci < cards.length; ci++) {
            if (cards[ci]) lastCardIndex = ci;
          }
          for (var i = 0; i < cards.length; i++) {
            if (!cards[i]) continue;
            (function (idx) {
              setTimeout(function () {
                cards[idx].classList.add("card-in");
              }, idx * CARD_STAGGER_MS);
            })(i);
          }
          // Start hint a little before the last card fully settles.
          var hintDelayMs = Math.max(
            0,
            (lastCardIndex >= 0 ? lastCardIndex * CARD_STAGGER_MS : 0) + CARD_IN_ANIM_MS - 120
          );
          resetCardVerifyUI({ deferStackHint: true });
          if (cardSelectText) {
            setTimeout(function () {
              animateCardSelectHintReveal();
            }, hintDelayMs);
          }
        },
          WALLET_FIRST_ANIM_MS +
            WALLET_AFTER_FIRST_PAUSE_MS +
            WALLET_TO_BOTTOM_ANIM_MS +
            CARDS_AFTER_WALLET_MS
        );

        var stackResizeTimer = null;
        window.addEventListener("resize", function () {
          window.clearTimeout(stackResizeTimer);
          stackResizeTimer = window.setTimeout(function () {
            applyCardStackTops();
            if (isVerifying && activeCard) {
              syncDigitsWrapToActiveCard();
            }
            if (postVerifyFinalStack) {
              syncAddAnotherAboveStack();
            }
          }, 120);
        });
      })();
    </script>
  </body>
</html>
