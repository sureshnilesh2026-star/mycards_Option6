<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=overlays-content"
    />
    <title>Verify OTP — MyCards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html {
        height: 100%;
        overflow: hidden;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      html::-webkit-scrollbar {
        display: none;
      }
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        font-family: Inter, system-ui, sans-serif;
        -webkit-tap-highlight-color: transparent;
        scrollbar-width: none;
        -ms-overflow-style: none;
        box-sizing: border-box;
        background: #ffffff;
      }
      body::-webkit-scrollbar {
        display: none;
      }
      /* Parked last-4 field (off-screen); during verify the input is moved onto the active card chip */
      #last-four-input-park {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
        left: 0;
        top: 0;
        pointer-events: none;
        z-index: 0;
      }
      #last-four-input-park #last-four-input {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
        opacity: 0;
      }
      #last-four-input.last-four-input--on-card {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        margin: 0;
        padding: 4px 6px;
        overflow: visible;
        clip: auto;
        white-space: nowrap;
        opacity: 1;
        border: 0;
        border-radius: 7px;
        background: transparent;
        font-size: 18px;
        font-weight: 400;
        letter-spacing: 2px;
        color: #fff;
        font-variant-numeric: tabular-nums;
        text-align: center;
        caret-color: #fff;
        z-index: 2;
        pointer-events: auto;
      }
      #last-four-input:focus {
        outline: none;
      }
      #last-four-input:focus-visible {
        outline: none;
      }
      .card-oncard-digits__last4--live-input .card-oncard-digits__text {
        opacity: 0;
        pointer-events: none;
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
      }
      .card-layer.card-verifying-last4 .card-oncard-digits {
        pointer-events: auto;
      }
      .card-layer.card-verifying-last4 .card-oncard-digits__dot-groups {
        pointer-events: none;
      }
      /* Phone shell: full width; height tracks dynamic viewport. Lifts whole screen above soft keyboard while verifying last-4. */
      .frame-root {
        --keyboard-lift: 0px;
        width: 100%;
        max-width: none;
        height: 100dvh;
        overflow: hidden;
        background: #ffffff;
        transform: translateY(calc(-1 * var(--keyboard-lift, 0px)));
        transition: transform 0.32s ease-in-out;
        will-change: transform;
      }
      @supports not (height: 100dvh) {
        .frame-root {
          height: 100vh;
          min-height: 100vh;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .frame-root {
          transition: none;
        }
      }
      #verify-bg-millennia,
      #verify-bg-infinia {
        transition: opacity 600ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      .frame-root.verify-bg--millennia #verify-bg-millennia {
        opacity: 1;
      }
      .frame-root.verify-bg--infinia #verify-bg-infinia {
        opacity: 1;
      }
      /* Top chrome: MyCards redesign app header (360×55), same asset as card.html; dark band so white artwork reads */
      #verify-top-bar {
        height: 55px;
        transform: translateY(-100%);
        transition: transform 600ms cubic-bezier(0.2, 0.8, 0.2, 1);
        background: linear-gradient(135deg, #0c101f 0%, #131b34 50%, #1a2545 100%);
        line-height: 0;
      }
      #verify-top-bar .verify-top-bar-img {
        position: relative;
        left: auto;
        top: auto;
        display: block;
        width: 100%;
        height: auto;
        max-height: 55px;
        object-fit: contain;
        object-position: left top;
      }
      #verify-top-bar.verify-top-bar--in {
        transform: translateY(0);
      }
      @media (prefers-reduced-motion: reduce) {
        #verify-top-bar {
          transform: translateY(0);
          transition: none;
        }
      }
      /* WalletFinal animation: start far below, then move to center */
      /* Credit cards: start below the visible frame so they read as rising from the bottom, not beside the wallet */
      .card-layer {
        opacity: 0;
        /* Keep X centered during Y animation; 100dvh ensures off-screen on tall viewports (fixed 1000px was not enough) */
        transform: translateX(-50%) translateY(calc(100dvh + 160px));
        will-change: transform, opacity;
        /* Staggered starts + spring settle (overshoot easing) */
        transition:
          transform 780ms cubic-bezier(0.34, 1.15, 0.55, 1),
          opacity 180ms cubic-bezier(0.2, 0.8, 0.2, 1);
        pointer-events: none;
      }
      @supports not (height: 100dvh) {
        .card-layer {
          transform: translateX(-50%) translateY(calc(100vh + 160px));
        }
      }
      .card-layer.card-in {
        opacity: 1;
        transform: translateX(-50%) translateY(0px);
        pointer-events: auto;
        cursor: pointer;
      }
      /* Card-number overlay aligned to Figma: 3x dot groups + right-side last-4 chip */
      .card-oncard-digits {
        position: absolute;
        left: 28px;
        top: 53%;
        right: auto;
        bottom: auto;
        /* Left anchored from card edge; only keep Y offset */
        transform: translateY(24px);
        box-sizing: border-box;
        min-width: 0;
        width: max-content;
        max-width: none;
        padding: 0;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 17px;
        pointer-events: none;
        z-index: 3;
        opacity: 1;
        transition: opacity 200ms ease;
      }
      .card-oncard-digits--empty {
        opacity: 1;
      }
      .card-oncard-digits__dot-groups {
        display: flex;
        align-items: center;
        gap: 17px;
      }
      .card-oncard-digits__group {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .card-oncard-digits__dot {
        width: 8px;
        height: 8px;
        border-radius: 9999px;
        background: rgba(255, 255, 255, 0.95);
      }
      .card-oncard-digits__last4 {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 68px;
        min-height: 30px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.4);
        background: rgba(0, 0, 0, 0.4);
        padding: 6px 8px;
      }
      .card-oncard-digits__text {
        font-size: 18px;
        font-weight: 400;
        letter-spacing: 2px;
        color: #fff;
        line-height: 1;
        font-variant-numeric: tabular-nums;
        text-shadow: none;
      }
      /* Keep on-card overlay visible through all animation steps */
      .frame-root.verify-float-digits-active .card-oncard-digits {
        opacity: 1 !important;
        visibility: visible;
      }
      #digit-display {
        text-shadow: none;
      }
      /* +110px right vs centered on card (was left-1/2 −translate-x-1/2) */
      #card-verify-digits {
        transform: translateX(calc(-50% + 110px));
      }
      /* “Select any card…” — JS sets top to (stack top − 4px); −100% keeps a 4px gap below text */
      #card-select-text {
        transform: translateX(-50%);
      }
      #card-select-text.card-select-text--above-stack {
        transform: translateX(-50%) translateY(-100%);
      }
      /* “Select any card…”: 24px below final top → slide up + fade in */
      #card-select-text.card-select-text--slide-in {
        transition:
          top 480ms cubic-bezier(0.2, 0.8, 0.2, 1),
          opacity 400ms ease-out;
      }
      /* Last-4 screen: “Enter last 4 digits…” + “Choose Another Card” — slide up from below */
      #card-select-text.verify-entry-copy--slide-in,
      #choose-another-card.verify-entry-copy--slide-in {
        transition:
          top 480ms cubic-bezier(0.2, 0.8, 0.2, 1),
          opacity 400ms ease-out;
      }
      #choose-another-card,
      #add-another-above-stack {
        transform: translateX(-50%);
      }
      /* Above-stack links — top set so control sits CARD_ADD_LINK_GAP px above stack */
      #choose-another-card.choose-another--above-stack,
      #add-another-above-stack.choose-another--above-stack {
        transform: translateX(-50%) translateY(-100%);
      }
      /* Fine-tune per asset — number row / last-4 slot varies slightly */
      #card-millenia .card-oncard-digits {
        left: 28px;
        top: 52.75%;
        transform: translateY(24px);
      }
      #card-infinia .card-oncard-digits {
        left: 28px;
        top: 53%;
      }
      /* Leather wallet PNG (720×528); width matches layout, height:auto keeps emboss/detail proportional */
      #wallet-final {
        width: calc(344px * 1.05);
        height: auto;
        max-width: none;
        object-fit: contain;
        transform: translateX(-50%) translateY(-50%) translateY(1000px) scale(0.9);
        transition: transform 700ms cubic-bezier(0.2, 0.8, 0.2, 1), opacity 450ms ease-out;
        opacity: 1;
      }
      #wallet-final.wallet-in {
        /* First animation: move to center + rotation, no scale change yet */
        transform: translateX(-50%) translateY(-50%) translateY(0px) rotate(-10deg) scale(0.85);
      }
      #wallet-final.wallet-resize {
        /* End of first animation: set size to 95% instantly (no animation at middle) */
        transition: none;
        transform: translateX(-50%) translateY(-50%) translateY(0px) rotate(-10deg) scale(0.85);
      }
      #wallet-final.wallet-bottom {
        /* End of second animation: return to 100% size (base scale) */
        transform: translateX(-50%) translateY(-50%) translateY(var(--wallet-delta, 0px)) rotate(0deg)
          scale(0.9);
      }
      /* Slide wallet down when the numeric keyboard opens (last-4 focus) and when the Verify CTA is shown */
      #wallet-final.wallet-exit {
        transform: translateX(-50%) translateY(-50%)
          translateY(calc(var(--wallet-delta, 0px) + 520px)) rotate(0deg) scale(0.9);
        opacity: 0;
        transition: transform 600ms cubic-bezier(0.2, 0.8, 0.2, 1), opacity 450ms ease-out;
        pointer-events: none;
      }
      /* Post–Verify CTA: wallet starts below seated position, then rises with cards */
      #wallet-final.wallet-rise-start {
        transform: translateX(-50%) translateY(-50%)
          translateY(calc(var(--wallet-delta, 0px) + 420px)) rotate(0deg) scale(0.9);
        opacity: 1;
        transition: none;
        pointer-events: none;
      }
      /* Post–final-stack card pick: wallet exits downward */
      #wallet-final.wallet-drop-away {
        transform: translateX(-50%) translateY(-50%)
          translateY(calc(var(--wallet-delta, 0px) + 820px)) rotate(0deg) scale(0.9);
        opacity: 0;
        transition: transform 750ms cubic-bezier(0.2, 0.8, 0.2, 1), opacity 550ms ease-out;
        pointer-events: none;
      }
      #verify-success-toast {
        transition: opacity 220ms ease-out;
      }
      #verify-success-toast .verify-success-toast__backdrop {
        opacity: 0;
        transition: opacity 220ms ease-out;
      }
      #verify-success-toast .verify-success-toast__sheet {
        transform: translateY(100%);
        transition: transform 320ms cubic-bezier(0.2, 0.8, 0.2, 1);
        will-change: transform;
      }
      #verify-success-toast.verify-success-toast--open .verify-success-toast__backdrop {
        opacity: 1;
      }
      #verify-success-toast.verify-success-toast--open .verify-success-toast__sheet {
        transform: translateY(0);
      }
      @media (prefers-reduced-motion: reduce) {
        #verify-success-toast .verify-success-toast__sheet {
          transition: none;
        }
        #verify-success-toast .verify-success-toast__backdrop {
          transition: none;
        }
      }
      /* Same 4px top edge as login / OTP sheets (index.html) */
      .verify-success-toast__sheet-top-gradient {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        height: 4px;
        z-index: 1;
        border-radius: 24px 24px 0 0;
        background: linear-gradient(90deg, #ffb6ba 0%, #1c3fca 50%, #ffb1b6 100%);
      }
      .verify-success-icon {
        width: 40px;
        height: 40px;
        border-radius: 9999px;
        background: #16a34a;
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        line-height: 1;
        font-weight: 700;
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: { DEFAULT: "#1C3FCA", hover: "#152f9e" },
            },
            boxShadow: {
              sheet: "0 -8px 24px rgba(0, 0, 0, 0.08)",
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-white flex items-start justify-center p-0 box-border w-full h-[100dvh]">
    <div class="frame-root relative rounded-none bg-white flex flex-col flex-shrink-0 w-full">
      <div

      <div
        id="verify-bg-infinia"

      <!-- Step: show only WalletFinal; hide all other elements -->
      <!-- App header chrome: redesign SVG (same asset as card.html) -->
      <div
        id="verify-top-bar"
        aria-hidden="true"
        class="absolute left-0 top-0 right-0 w-full overflow-hidden z-[100] pointer-events-none"

        <img

          alt=""
          width="360"
          height="55"
          draggable="false"
          class="verify-top-bar-img select-none pointer-events-none"
        />
      </div>

      <!-- Info layer from Figma node 881:85873 -->
      <div
        id="info-layer"
        class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[328px] flex flex-col items-center gap-[16px] z-[20] pointer-events-none opacity-0 transition-[top,transform,opacity] duration-[600ms] ease-out"
        aria-hidden="true"
      >
        <div class="relative w-[160px] h-[160px] shrink-0">
          <img
            src="assets/c9edcfae67445f3b52f45179a05ee41d53627907.svg"

            draggable="false"
            class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[153px] h-[109px] object-contain"
          />
          <img
            src="assets/6566b437c54ef9890f06c659a00acc2afaa446cb.svg"
            alt=""
            draggable="false"
            class="absolute left-[104.51px] top-[50.44px] -translate-x-1/2 -translate-y-1/2 w-[21.098px] h-[22.24px] object-contain"
          />
          <img
            src="assets/52f238cbdfb30badf7d57feaa6ebdeffb5f58e97.svg"
            alt=""
            draggable="false"
            class="absolute left-[111.27px] top-[94.41px] -translate-x-1/2 -translate-y-1/2 w-[74.103px] h-[64.052px] object-contain"
          />
          <img
            src="assets/3d016b563f58cd39b4785196e89197ed1168a9bb.svg"
            alt=""
            draggable="false"
            class="absolute left-[18.9px] top-[91.25px] -translate-x-1/2 -translate-y-1/2 w-[19.806px] h-[17.776px] object-contain"
          />
          <img
            src="assets/60ad7379516791606593790328ac9ecb62e15d26.svg"
            alt=""
            draggable="false"
            class="absolute left-[65.54px] top-[76.5px] -translate-x-1/2 -translate-y-1/2 w-[75.485px] h-[106.969px] object-contain"
          />
          <img
            src="assets/ce18d24cee69235ce9abacb329806eedbeb23641.svg"
            alt=""
            draggable="false"
            class="absolute left-[71.65px] top-[37.53px] -translate-x-1/2 -translate-y-1/2 w-[28.315px] h-[9.304px] object-contain"
          />
          <img
            src="assets/5d722a266ce7e6e6a1357ba42ebaae72f43d71dd.svg"
            alt=""
            draggable="false"
            class="absolute left-[61.87px] top-[78.5px] -translate-x-1/2 -translate-y-1/2 w-[41.062px] h-[38.317px] object-contain"
          />
        </div>
        <p
          id="info-layer-title"
          class="text-[16px] font-semibold text-black leading-none tracking-[-0.32px] whitespace-nowrap"
        >
          Let’s Verify if It’s You
        </p>
        <button
          type="button"
          id="info-layer-add-card"
          class="hidden shrink-0 text-center text-[12px] font-semibold text-[#1C3FCA] whitespace-nowrap opacity-0 pointer-events-none transition-opacity duration-300 hover:underline"
        >
          Add Another Card
        </button>
        <div
          id="info-layer-subtext"
          class="w-[328px] text-center text-[#4b5563] text-[12px] leading-[1.4] opacity-80"
        >
          <p class="m-0">
            We have found following cards<br />
            on this mobile number
          </p>
        </div>
      </div>

      <!-- Separate cards (use exact card PNGs); wrapper retains .card-layer motion -->
      <div
        id="card-infinia"
        class="card-layer absolute left-1/2 top-[348px] w-[312px] h-[200px] z-[6] overflow-hidden rounded-[12px] pointer-events-auto select-none cursor-pointer"
      >
        <img
          src="assets/card-infinia.png"
          alt=""
          draggable="false"
          aria-hidden="true"
          class="absolute inset-0 h-full w-full object-cover pointer-events-none select-none"
        />
        <div class="card-oncard-digits card-oncard-digits--empty" aria-hidden="true">
          <div class="card-oncard-digits__dot-groups" aria-hidden="true">
            <span class="card-oncard-digits__group">
              <span class="card-oncard-digits__dot"></span><span class="card-oncard-digits__dot"></span><span class="card-oncard-digits__dot"></span><span class="card-oncard-digits__dot"></span>
            </span>
            <span class="card-oncard-digits__group">
              <span class="card-oncard-digits__dot"></span><span class="card-oncard-digits__dot"></span><span class="card-oncard-digits__dot"></span><span class="card-oncard-digits__dot"></span>
            </span>
            <span class="card-oncard-digits__group">
              <span class="card-oncard-digits__dot"></span><span class="card-oncard-digits__dot"></span><span class="card-oncard-digits__dot"></span><span class="card-oncard-digits__dot"></span>
            </span>
          </div>
          <span class="card-oncard-digits__last4"><span class="card-oncard-digits__text">3333</span></span>

      <div
        id="card-millenia"
        class="card-layer absolute left-1/2 top-[423px] w-[312px] h-[200px] z-[6] overflow-hidden rounded-[12px] pointer-events-auto select-none cursor-pointer"

        <img
          src="assets/card-millenia.png"
          alt=""

          class="absolute inset-0 h-full w-full object-cover pointer-events-none select-none"
        />
        <div class="card-oncard-digits card-oncard-digits--empty" aria-hidden="true">
          <div class="card-oncard-digits__dot-groups" aria-hidden="true">
            <span class="card-oncard-digits__group">
              <span class="card-oncard-digits__dot"></span><span class="card-oncard-digits__dot"></span><span class="card-oncard-digits__dot"></span><span class="card-oncard-digits__dot"></span>
            </span>
            <span class="card-oncard-digits__group">
              <span class="card-oncard-digits__dot"></span><span class="card-oncard-digits__dot"></span><span class="card-oncard-digits__dot"></span><span class="card-oncard-digits__dot"></span>

              <span class="card-oncard-digits__dot"></span><span class="card-oncard-digits__dot"></span><span class="card-oncard-digits__dot"></span><span class="card-oncard-digits__dot"></span>

      <p
        id="card-select-text"
        class="absolute left-1/2 top-[360px] z-[30] text-[12px] font-semibold text-[#00875F] whitespace-nowrap opacity-0 pointer-events-none"
      >
        Select any card to verify
      </p>

      <button
        id="choose-another-card"

        class="absolute left-1/2 top-[385px] z-[30] text-[12px] font-semibold text-[#1C3FCA] whitespace-nowrap opacity-0 pointer-events-none hover:underline"
      >
        Choose Another Card
      </button>

      <button
        id="add-another-above-stack"
        type="button"
        class="absolute left-1/2 top-[385px] z-[30] text-[12px] font-semibold text-[#00875F] whitespace-nowrap opacity-0 pointer-events-none transition-opacity duration-300 hover:underline"
      >
        Select Card to Continue
      </button>

      <button
        id="verify-card-cta"
        type="button"
        class="absolute left-1/2 bottom-[18px] -translate-x-1/2 z-[35] w-[312px] h-[42px] rounded-[14px] bg-[#1C3FCA] text-white text-[16px] font-semibold leading-none flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300"
      >
        Verify
      </button>
      <div
        id="verify-success-toast"
        class="absolute inset-0 z-[85] flex flex-col justify-end opacity-0 pointer-events-none"
        aria-hidden="true"
      >
        <div class="verify-success-toast__backdrop absolute inset-0 bg-black/25" aria-hidden="true"></div>
        <div
          class="verify-success-toast__sheet relative w-full min-h-[212px] overflow-hidden rounded-t-[24px] bg-white pt-8 px-6 pb-10 shadow-[0_-8px_24px_rgba(0,0,0,0.12)] flex flex-col items-center text-center"
          role="dialog"

          <div class="verify-success-toast__sheet-top-gradient" aria-hidden="true"></div>
          <div class="mx-auto verify-success-icon">✓</div>
          <p id="verify-success-title" class="mt-7 text-[16px] font-semibold leading-tight text-[#111827]">
            Verification Successful!
          </p>
        </div>
      </div>

      <!-- Last-4 digits display (floating strip + .card-oncard-digits on each card; see CSS + DIGITS_* in script) -->
      <div
        id="card-verify-digits"
        class="absolute left-1/2 top-[290px] z-[6] opacity-0 pointer-events-none will-change-[top,opacity]"
        aria-hidden="true"
      >
        <span
          id="digit-display"
          class="w-[86px] h-[44px] flex items-center justify-center text-[16px] font-medium leading-none tracking-[2px] text-white translate-x-[-8px] -translate-y-[10px]"
        ></span>
      </div>

      <!-- Native keyboard: input is parked off-screen, then moved onto the active card chip while verifying -->
      <div id="last-four-input-park" aria-hidden="true">
        <input
          type="tel"
          id="last-four-input"
          inputmode="numeric"
          autocomplete="one-time-code"
          pattern="[0-9]*"
          maxlength="4"
          enterkeyhint="done"
          aria-label="Last 4 digits of card"
        />
      </div>

      <img
        src="assets/wallet-final.png?v=3"
        alt="My Cards wallet"
        draggable="false"
        id="wallet-final"
        class="absolute left-1/2 top-1/2 pointer-events-none select-none z-[10]"
        width="720"
        height="528"
        loading="eager"
        decoding="async"
      />
    </div>
    <script>
      // Start wallet slide-up animation on load
      (function () {
        var el = document.getElementById("wallet-final");
        var topBar = document.getElementById("verify-top-bar");
        function revealVerifyTopBar() {
          if (!topBar) return;
          if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
            topBar.classList.add("verify-top-bar--in");
            return;
          }
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              topBar.classList.add("verify-top-bar--in");
            });
          });
        }
        revealVerifyTopBar();
        var infoLayer = document.getElementById("info-layer");
        var infoLayerTitle = document.getElementById("info-layer-title");
        var infoLayerSubtext = document.getElementById("info-layer-subtext");
        var cardSelectText = document.getElementById("card-select-text");
        var chooseAnotherCard = document.getElementById("choose-another-card");
        var infoLayerAddCard = document.getElementById("info-layer-add-card");
        var addAnotherAboveStack = document.getElementById("add-another-above-stack");
        var verifyCardCta = document.getElementById("verify-card-cta");
        var verifySuccessToast = document.getElementById("verify-success-toast");
        var lastFourInput = document.getElementById("last-four-input");
        var lastFourInputPark = document.getElementById("last-four-input-park");
        var digitsWrap = document.getElementById("card-verify-digits");
        var frameShell = document.querySelector(".frame-root");
        function setFloatingDigitStripActive(on) {
          if (frameShell) frameShell.classList.toggle("verify-float-digits-active", !!on);
        }
        var cards = [
          document.getElementById("card-infinia"),
          document.getElementById("card-millenia"),
        ];
        /* Slugs for new_cards.html?card=… (same order as cards[]). */
        var CARD_SLUGS = ["infinia", "millennia"];
        var isVerifying = false;
        var activeCard = null;
        var enteredDigits = [];
        var postVerifyFinalStack = false;
        var postVerifyFinalPickDone = false;
        var lastVerifiedStackIndex = -1;
        /* Post–verify pick: selected card animates to this top (px). */
        var FINAL_PICK_TOP_PX = 208;
        var FINAL_PICK_EXTRA_UP_PX = 70;
        var FINAL_PICK_SCALE = 0.7;
        /* digit strip sits this far below the active card’s top (px); same offset after Done */
        var DIGITS_TOP_OFFSET = 118;
        var VERIFY_INPUT_LIFT_PX = 80;
        var VERIFY_END_SHIFT_UP_PX = 120;
        var CARD_TOP_KEYBOARD_BASE = 360;
        var CARD_TOP_KEYBOARD = CARD_TOP_KEYBOARD_BASE - VERIFY_INPUT_LIFT_PX - VERIFY_END_SHIFT_UP_PX;
        var CARD_TOP_AFTER_DONE = 520 - VERIFY_END_SHIFT_UP_PX;
        var CARD_SELECT_VERIFY_TOP_BASE = 308;
        var CHOOSE_ANOTHER_VERIFY_TOP_BASE = 338;
        var INFO_LAYER_VERIFY_TOP_BASE = -78;
        var DIGITS_LEFT = "50%";
        var CARD_MOVE_EASE = "top 600ms cubic-bezier(0.2, 0.8, 0.2, 1)";
        /* Fallback tops before wallet reaches .wallet-bottom (no-js / first paint) */
        var CARD_STACK_TOPS_PX = [348, 423];
        var CARD_STACK_GAP = 51;
        /* Infinia (stack index 0) sits this many px higher than the wallet-derived base Y. */
        var INFINIA_STACK_NUDGE_UP_PX = 24;
        /* Y of wallet-derived stack base for Millenia = (wallet img top in frame) − this (see getWalletTopInFrame) */
        var CARD_STACK_OFFSET_ABOVE_WALLET = 130;
        /* Vertical gap between hint / above-stack link bottom and top-of-stack (px) */
        var CARD_SELECT_GAP_ABOVE_STACK = 2;
        var CARD_ADD_LINK_GAP_ABOVE_STACK = 4;
        var STACK_RETURN_RISE_PX = 400;
        var STACK_RETURN_ANIM_MS = 900;
        var INFO_TITLE_VERIFY = "Let’s Verify if It’s You";
        var INFO_TITLE_STACK = "We have added all these cards";
        var FINAL_PICK_ANIM_MS = 600;
        var CARD_SELECT_VERIFY_TOP =
          CARD_SELECT_VERIFY_TOP_BASE - VERIFY_INPUT_LIFT_PX - VERIFY_END_SHIFT_UP_PX;
        var CHOOSE_ANOTHER_VERIFY_TOP =
          CHOOSE_ANOTHER_VERIFY_TOP_BASE - VERIFY_INPUT_LIFT_PX - VERIFY_END_SHIFT_UP_PX;
        var INFO_LAYER_VERIFY_TOP = INFO_LAYER_VERIFY_TOP_BASE - VERIFY_INPUT_LIFT_PX;
        var POST_INPUT_SHIFT_UP_PX = 120;
        var VERIFY_SUCCESS_MS = 2000;
        var VERIFY_SUCCESS_SHEET_MS = 320;
        var CARD_AFTER_DONE_EXTRA_UP_PX = 40;
        var isVerifySuccessShowing = false;
        /* Verification starts only on explicit card click from stack (no auto-open on load). */
        var VERIFY_AUTO_START_LAST4_ON_LOAD = false;

        /** visualViewport-driven lift: keeps the mounted last-4 chip above the soft keyboard while verifying. */
        var verifyKeyboardLiftTimer = null;
        var verifyKeyboardLiftRaf = null;
        var lastVerifyLiftApplied = -1;

        function setFinalFrameTheme(theme) {
          if (!frameShell) return;
          frameShell.classList.remove("verify-bg--millennia", "verify-bg--infinia");
          if (theme === "millennia") {
            frameShell.classList.add("verify-bg--millennia");
          } else if (theme === "infinia") {
            frameShell.classList.add("verify-bg--infinia");
          }
        }

        function getWalletTopInFrame() {
          if (!frameShell || !el) return 0;
          var f = frameShell.getBoundingClientRect();
          var w = el.getBoundingClientRect();
          return w.top - f.top;
        }

        /** Millenia at baseY + CARD_STACK_GAP; Infinia 24px above that baseline. */
        function stackTopsFromBaseY(baseY) {
          return [baseY - INFINIA_STACK_NUDGE_UP_PX, baseY + CARD_STACK_GAP];
        }

        /** Recover stack base Y from a card’s measured `top` and its stack index. */
        function inferStackBaseFromCardTop(stackIdx, topPx) {
          if (stackIdx === 0) return topPx + INFINIA_STACK_NUDGE_UP_PX;
          return topPx - stackIdx * CARD_STACK_GAP;
        }

        function getStackTopsPx() {
          if (!el || !el.classList.contains("wallet-bottom")) {
            return CARD_STACK_TOPS_PX.slice();
          }
          var walletTop = getWalletTopInFrame();
          var base = walletTop - CARD_STACK_OFFSET_ABOVE_WALLET;
          return stackTopsFromBaseY(base);
        }

        function syncCardSelectStackHint(stackBaseTopPx) {
          if (!cardSelectText) return;
          if (isVerifying || postVerifyFinalStack) return;
          /* Don’t snap `top` while the hint is mid–slide-in (inline transition:none priming + rAF). */
          if (cardSelectText.classList.contains("card-select-text--slide-in")) return;
          cardSelectText.classList.add("card-select-text--above-stack");
          cardSelectText.style.top = stackBaseTopPx - CARD_SELECT_GAP_ABOVE_STACK + "px";
        }

        /** Start this many px *below* final `top` (larger top value), then slide up into place */
        var CARD_SELECT_HINT_SLIDE_FROM_BELOW_PX = 24;
        function animateCardSelectHintReveal() {
          if (!cardSelectText) return;
          if (isVerifying || postVerifyFinalStack) return;
          if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
            cardSelectText.textContent = "Select any card to verify";
            cardSelectText.classList.add("card-select-text--above-stack");
            cardSelectText.style.color = "";
            cardSelectText.style.fontWeight = "";
            cardSelectText.style.fontSize = "";
            cardSelectText.style.top =
              getStackBaseTopPx() - CARD_SELECT_GAP_ABOVE_STACK + "px";
            cardSelectText.classList.remove("opacity-0");
            cardSelectText.classList.add("opacity-100");
            cardSelectText.removeAttribute("aria-hidden");
            return;
          }

          var finalTop = getStackBaseTopPx() - CARD_SELECT_GAP_ABOVE_STACK;
          var startTop = finalTop + CARD_SELECT_HINT_SLIDE_FROM_BELOW_PX;

          cardSelectText.textContent = "Select any card to verify";
          cardSelectText.classList.add("card-select-text--above-stack");
          cardSelectText.style.color = "";
          cardSelectText.style.fontWeight = "";
          cardSelectText.style.fontSize = "";
          cardSelectText.classList.remove("card-select-text--slide-in");
          cardSelectText.style.transition = "none";
          cardSelectText.style.top = startTop + "px";
          cardSelectText.classList.add("opacity-0");
          cardSelectText.classList.remove("opacity-100");
          void cardSelectText.offsetHeight;

          cardSelectText.classList.add("card-select-text--slide-in");
          /* Inline `transition: none` beats the stylesheet; remove it so slide-in CSS can run. */
          cardSelectText.style.removeProperty("transition");

          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              cardSelectText.classList.remove("opacity-0");
              cardSelectText.classList.add("opacity-100");
              cardSelectText.removeAttribute("aria-hidden");
              cardSelectText.style.top = finalTop + "px";
            });
          });

          window.setTimeout(function () {
            if (!cardSelectText) return;
            cardSelectText.classList.remove("card-select-text--slide-in");
            cardSelectText.style.removeProperty("transition");
          }, 550);
        }

        var VERIFY_ENTRY_COPY_SLIDE_PX = 400;
        function animateVerifyEntryCopy() {
          var labelFinal = CARD_SELECT_VERIFY_TOP;
          var chooseFinal = CHOOSE_ANOTHER_VERIFY_TOP;
          if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
            if (cardSelectText) {
              cardSelectText.style.top = labelFinal + "px";
              cardSelectText.classList.remove("opacity-0");
              cardSelectText.classList.add("opacity-100");
              cardSelectText.removeAttribute("aria-hidden");
            }
            if (chooseAnotherCard) {
              chooseAnotherCard.style.top = chooseFinal + "px";
              chooseAnotherCard.classList.remove("opacity-0", "pointer-events-none");
              chooseAnotherCard.classList.add("opacity-100", "pointer-events-auto");
            }
            return;
          }
          if (cardSelectText) {
            cardSelectText.classList.remove("verify-entry-copy--slide-in");
            cardSelectText.style.transition = "none";
            cardSelectText.style.top = labelFinal + VERIFY_ENTRY_COPY_SLIDE_PX + "px";
            cardSelectText.classList.add("opacity-0");
            cardSelectText.classList.remove("opacity-100");
          }
          if (chooseAnotherCard) {
            chooseAnotherCard.classList.remove("verify-entry-copy--slide-in");
            chooseAnotherCard.style.transition = "none";
            chooseAnotherCard.style.top = chooseFinal + VERIFY_ENTRY_COPY_SLIDE_PX + "px";
            chooseAnotherCard.classList.add("opacity-0", "pointer-events-none");
            chooseAnotherCard.classList.remove("opacity-100", "pointer-events-auto");
          }
          void (cardSelectText && cardSelectText.offsetHeight);

          if (cardSelectText) {
            cardSelectText.classList.add("verify-entry-copy--slide-in");
            cardSelectText.style.removeProperty("transition");
          }
          if (chooseAnotherCard) {
            chooseAnotherCard.classList.add("verify-entry-copy--slide-in");
            chooseAnotherCard.style.removeProperty("transition");
          }

          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              if (cardSelectText) {
                cardSelectText.classList.remove("opacity-0");
                cardSelectText.classList.add("opacity-100");
                cardSelectText.removeAttribute("aria-hidden");
                cardSelectText.style.top = labelFinal + "px";
              }
              if (chooseAnotherCard) {
                chooseAnotherCard.classList.remove("opacity-0", "pointer-events-none");
                chooseAnotherCard.classList.add("opacity-100", "pointer-events-auto");
                chooseAnotherCard.style.top = chooseFinal + "px";
              }
            });
          });

          window.setTimeout(function () {
            if (cardSelectText) {
              cardSelectText.classList.remove("verify-entry-copy--slide-in");
              cardSelectText.style.removeProperty("transition");
            }
            if (chooseAnotherCard) {
              chooseAnotherCard.classList.remove("verify-entry-copy--slide-in");
              chooseAnotherCard.style.removeProperty("transition");
            }
          }, 550);
        }

        function getStackBaseTopPx() {
          if (!el || !frameShell || !el.classList.contains("wallet-bottom")) {
            return CARD_STACK_TOPS_PX[0];
          }
          return (
            getWalletTopInFrame() - CARD_STACK_OFFSET_ABOVE_WALLET - INFINIA_STACK_NUDGE_UP_PX
          );
        }

        function hidePostVerifyAddCardChrome() {
          if (infoLayerAddCard) {
            infoLayerAddCard.classList.add("hidden");
            infoLayerAddCard.classList.add("opacity-0", "pointer-events-none");
            infoLayerAddCard.classList.remove("opacity-100", "pointer-events-auto");
          }
          if (addAnotherAboveStack) {
            addAnotherAboveStack.classList.remove("choose-another--above-stack");
            addAnotherAboveStack.style.top = "";
            addAnotherAboveStack.classList.add("opacity-0", "pointer-events-none");
            addAnotherAboveStack.classList.remove("opacity-100", "pointer-events-auto");
          }
        }

        function setCardOverlaysVisible(visible) {
          var overlays = document.querySelectorAll(".card-oncard-digits");
          for (var oi = 0; oi < overlays.length; oi++) {
            var ov = overlays[oi];
            if (!ov) continue;
            if (visible) {
              ov.style.opacity = "";
              ov.style.visibility = "";
            } else {
              ov.style.opacity = "0";
              ov.style.visibility = "hidden";
            }
          }
        }

        function syncAddAnotherAboveStack(optStackBaseTopPx) {
          if (!addAnotherAboveStack) return;
          var base =
            optStackBaseTopPx != null && !isNaN(parseFloat(optStackBaseTopPx, 10))
              ? parseFloat(optStackBaseTopPx, 10)
              : getStackBaseTopPx();
          if (isNaN(base)) return;
          addAnotherAboveStack.classList.add("choose-another--above-stack");
          addAnotherAboveStack.style.top = base - CARD_ADD_LINK_GAP_ABOVE_STACK + "px";
        }

        function applyCardStackTops(opts) {
          opts = opts || {};
          if (!frameShell || !el) return;
          if (!el.classList.contains("wallet-bottom")) return;
          if (isVerifying) return;
          if (postVerifyFinalPickDone) return;
          var walletTop = getWalletTopInFrame();
          var base = walletTop - CARD_STACK_OFFSET_ABOVE_WALLET;
          var tops = stackTopsFromBaseY(base);
          for (var si = 0; si < cards.length; si++) {
            if (!cards[si]) continue;
            cards[si].style.top = tops[si] + "px";
          }
          if (!opts.skipCardSelectHint) {
            syncCardSelectStackHint(base);
          }
          if (postVerifyFinalStack) {
            syncAddAnotherAboveStack();
          }
        }

        function onWalletBottomSettled() {
          if (!el || !frameShell) return;
          if (!el.classList.contains("wallet-bottom")) return;
          applyCardStackTops();
        }

        function cardDetailsHref(stackIdx) {
          var slug = CARD_SLUGS[stackIdx] || "infinia";
          return "new_cards.html?card=" + encodeURIComponent(slug);
        }

        function restoreInfoLayerVerifyCopy() {
          if (infoLayerTitle) infoLayerTitle.textContent = INFO_TITLE_VERIFY;
          if (infoLayerSubtext) infoLayerSubtext.classList.remove("hidden");
          hidePostVerifyAddCardChrome();
        }

        function stackIndexOfCard(cardEl) {
          for (var si = 0; si < cards.length; si++) {
            if (cards[si] === cardEl) return si;
          }
          return -1;
        }

        function syncDigitsWrapToActiveCard() {
          if (!digitsWrap || !activeCard) return;
          var raw = activeCard.style.top;
          var t = parseFloat(raw, 10);
          if (isNaN(t)) {
            t = parseFloat(getComputedStyle(activeCard).top, 10);
          }
          if (isNaN(t)) return;
          digitsWrap.style.top = t + DIGITS_TOP_OFFSET + "px";
        }

        function removeCardVerifyingLast4FromAll() {
          for (var ri = 0; ri < cards.length; ri++) {
            if (cards[ri]) cards[ri].classList.remove("card-verifying-last4");
          }
        }

        function parkLastFourInput() {
          if (!lastFourInput || !lastFourInputPark) return;
          lastFourInput.classList.remove("last-four-input--on-card");
          var liveSlots = document.querySelectorAll(".card-oncard-digits__last4--live-input");
          for (var li = 0; li < liveSlots.length; li++) {
            liveSlots[li].classList.remove("card-oncard-digits__last4--live-input");
          }
          lastFourInputPark.appendChild(lastFourInput);
        }

        function mountLastFourInputOnActiveCard() {
          if (!lastFourInput || !activeCard) return;
          var last4 = activeCard.querySelector(".card-oncard-digits__last4");
          if (!last4) return;
          var prevLive = document.querySelectorAll(".card-oncard-digits__last4--live-input");
          for (var pi = 0; pi < prevLive.length; pi++) {
            prevLive[pi].classList.remove("card-oncard-digits__last4--live-input");
          }
          last4.classList.add("card-oncard-digits__last4--live-input");
          lastFourInput.classList.add("last-four-input--on-card");
          last4.appendChild(lastFourInput);
        }

        function slideWalletForLastFourKeyboard() {
          if (!el || !isVerifying) return;
          el.classList.add("wallet-exit");
        }

        function applyVerifyKeyboardLift() {
          if (!frameShell) return;
          if (verifyKeyboardLiftRaf) cancelAnimationFrame(verifyKeyboardLiftRaf);
          verifyKeyboardLiftRaf = requestAnimationFrame(function () {
            verifyKeyboardLiftRaf = null;
            if (!isVerifying || !lastFourInput || !lastFourInput.classList.contains("last-four-input--on-card")) {
              lastVerifyLiftApplied = -1;
              frameShell.style.setProperty("--keyboard-lift", "0px");
              return;
            }
            var vv = window.visualViewport;
            if (!vv) return;
            var visibleBottom = vv.offsetTop + vv.height;
            var margin = 14;
            var chipBottom = lastFourInput.getBoundingClientRect().bottom;
            var lift = Math.max(0, Math.round(chipBottom - visibleBottom + margin));
            var cap = Math.round(window.innerHeight * 0.9);
            if (lift > cap) lift = cap;
            if (lift === lastVerifyLiftApplied) return;
            lastVerifyLiftApplied = lift;
            frameShell.style.setProperty("--keyboard-lift", lift + "px");
          });
        }

        function scheduleVerifyKeyboardLift() {
          window.clearTimeout(verifyKeyboardLiftTimer);
          verifyKeyboardLiftTimer = window.setTimeout(function () {
            verifyKeyboardLiftTimer = null;
            applyVerifyKeyboardLift();
          }, 48);
        }

        if (window.visualViewport) {
          window.visualViewport.addEventListener("resize", scheduleVerifyKeyboardLift);
          window.visualViewport.addEventListener("scroll", scheduleVerifyKeyboardLift);
        }

        function renderDigits() {
          var text = enteredDigits.join("");
          if (lastFourInput) {
            if (lastFourInput.value !== text) lastFourInput.value = text;
          }
          var display = document.getElementById("digit-display");
          if (display) display.textContent = text;
          var onCardWraps = document.querySelectorAll(".card-oncard-digits");
          for (var oc = 0; oc < onCardWraps.length; oc++) {
            var wrap = onCardWraps[oc];
            var span = wrap.querySelector(".card-oncard-digits__text");
            if (span) span.textContent = text;
            if (!text) {
              wrap.classList.add("card-oncard-digits--empty");
            } else {
              wrap.classList.remove("card-oncard-digits--empty");
            }
          }
        }

        function focusLastFourField() {
          if (!lastFourInput || !isVerifying) return;
          slideWalletForLastFourKeyboard();
          try {
            lastFourInput.focus({ preventScroll: true });
          } catch (e) {
            lastFourInput.focus();
          }
          var len = lastFourInput.value.length;
          if (typeof lastFourInput.setSelectionRange === "function") {
            lastFourInput.setSelectionRange(len, len);
          }
          scheduleVerifyKeyboardLift();
        }

        /** Defer focus() until the active card’s 600ms move transition ends so the IME does not open mid-animation (avoids focus loss / flicker). */
        function scheduleFocusWhenVerifyCardSettled(cardEl, onReady) {
          if (!cardEl || typeof onReady !== "function") return;
          if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
            requestAnimationFrame(function () {
              requestAnimationFrame(onReady);
            });
            return;
          }
          var finished = false;
          function done() {
            if (finished) return;
            finished = true;
            cardEl.removeEventListener("transitionend", onTe);
            window.clearTimeout(fallbackId);
            onReady();
          }
          function onTe(ev) {
            if (ev.target !== cardEl) return;
            if (ev.propertyName !== "top" && ev.propertyName !== "transform") return;
            done();
          }
          cardEl.addEventListener("transitionend", onTe);
          var fallbackId = window.setTimeout(done, 700);
        }

        function blurLastFourField() {
          if (lastFourInput) lastFourInput.blur();
        }

        if (lastFourInput) {
          lastFourInput.addEventListener("input", function () {
            if (!isVerifying) return;
            var raw = this.value.replace(/\D/g, "").slice(0, 4);
            this.value = raw;
            enteredDigits = raw.split("");
            renderDigits();
            if (enteredDigits.length === 4) {
              dismissKeyboardAndMoveContentDown();
            }
            scheduleVerifyKeyboardLift();
          });
          lastFourInput.addEventListener("blur", function () {
            if (!isVerifying) return;
            if (enteredDigits.length < 4 && el) {
              el.classList.remove("wallet-exit");
            }
            scheduleVerifyKeyboardLift();
          });
          lastFourInput.addEventListener("focus", function () {
            scheduleVerifyKeyboardLift();
          });
        }

        /** Stack Y targets (px) for seated wallet; uses a non-active card’s current top when possible */
        function getChooseAnotherStackTopsPx(activeIdx) {
          var ref = -1;
          var refTop = NaN;
          for (var i = 0; i < cards.length; i++) {
            if (i === activeIdx) continue;
            var c = cards[i];
            if (!c) continue;
            var t = parseFloat(c.style.top, 10);
            if (isNaN(t)) t = parseFloat(getComputedStyle(c).top, 10);
            if (!isNaN(t)) {
              ref = i;
              refTop = t;
              break;
            }
          }
          if (ref < 0 || isNaN(refTop)) return getStackTopsPx();
          var base = inferStackBaseFromCardTop(ref, refTop);
          return stackTopsFromBaseY(base);
        }

        /** When leaving last-4 flow: verify title + “Choose Another” move down and fade (same copy; no text swap until hidden). */
        var VERIFY_COPY_EXIT_DROP_PX = 100;

        /** Selected card eases to its stack Y; wallet + other cards rise from below (same pattern as returnToStackAfterVerify) */
        function animateReturnToStackFromChooseAnother() {
          if (!isVerifying || !activeCard) {
            resetCardVerifyUI();
            return;
          }
          if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
            resetCardVerifyUI();
            return;
          }

          var prev = activeCard;
          var activeIdx = stackIndexOfCard(prev);
          if (activeIdx < 0) {
            resetCardVerifyUI();
            return;
          }

          var stackEase = "cubic-bezier(0.2, 0.8, 0.2, 1)";
          var stackMs = STACK_RETURN_ANIM_MS;

          var selectedFromTop = parseFloat(prev.style.top, 10);

          }

          for (var i = 0; i < cards.length; i++) {
            var c = cards[i];
            if (!c) continue;
            var stackTop = stackTopsReturn[i];
            c.style.pointerEvents = "none";
            c.style.zIndex = "";
            c.style.transition = "none";

            if (i === activeIdx) {
              var fromTop = parseFloat(getComputedStyle(c).top, 10);
              if (isNaN(fromTop)) fromTop = CARD_TOP_AFTER_DONE;
              c.style.top = fromTop + "px";
              c.style.opacity = "1";
              c.style.transform = "translateX(-50%) translateY(0)";
            } else {
              c.style.top = stackTop + "px";
              c.style.opacity = "0";
              c.style.transform =
                "translateX(-50%) translateY(" + STACK_RETURN_RISE_PX + "px)";
            }
          }
          void (cards[0] && cards[0].offsetHeight);

          /* Prime transition, then apply end state on a later frame — same-frame transition+value often skips interpolation */
          function primeStackReturnTransitions() {
            for (var j = 0; j < cards.length; j++) {
              var cj = cards[j];
              if (!cj) continue;
              if (j === activeIdx) {
                cj.style.transition =
                  "top " + stackMs + "ms " + stackEase + ", transform " + stackMs + "ms " + stackEase;
              } else {
                cj.style.transition =
                  "transform " +
                  stackMs +
                  "ms " +
                  stackEase +
                  ", opacity " +
                  stackMs +
                  "ms " +
                  stackEase;
              }
            }
            void (cards[0] && cards[0].offsetHeight);
          }

          function applyStackReturnEndStateAndWallet() {
            if (el) {
              el.style.transition =
                "transform " + stackMs + "ms " + stackEase;
              el.classList.remove("wallet-rise-start");
              el.classList.add("wallet-bottom");
              window.setTimeout(function () {
                if (el) el.style.transition = "";
              }, stackMs);
            }
            for (var j = 0; j < cards.length; j++) {
              var cj = cards[j];
              if (!cj) continue;
              var stackTopJ = stackTopsReturn[j];
              cj.style.top = stackTopJ + "px";
              cj.style.transform = "translateX(-50%) translateY(0)";
              cj.style.opacity = "1";
              cj.style.zIndex = "";
            }
            if (el) el.style.zIndex = "";
          }

          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              primeStackReturnTransitions();
              requestAnimationFrame(applyStackReturnEndStateAndWallet);
            });
          });

          window.setTimeout(function () {
            postVerifyFinalStack = true;
            setCardOverlaysVisible(false);
            for (var k = 0; k < cards.length; k++) {
              var ck = cards[k];
              if (!ck) continue;
              ck.style.transition = "";
              ck.style.transitionDelay = "";
              ck.style.pointerEvents = "auto";
              ck.style.cursor = "pointer";
              ck.style.zIndex = "";
            }
            applyCardStackTops();
          }, stackMs + 120);
        }

        // Card click handlers: all cards clickable; after Verify → final stack, any card runs pick-up + card_details navigation.
        for (var i = 0; i < cards.length; i++) {
          (function (idx) {
            var c = cards[idx];
            if (!c) return;
            c.addEventListener("click", function () {
              if (postVerifyFinalStack) {
                animateFinalStackPick(idx);
                return;
              }
              startCardVerifyForCard(c);
            });
          })(i);
        }

        if (chooseAnotherCard) {
          chooseAnotherCard.addEventListener("click", function () {
            if (isVerifying) {
              animateReturnToStackFromChooseAnother();
              return;
            }
          });
        }
        if (verifyCardCta) {
          verifyCardCta.addEventListener("click", function () {
            if (isVerifySuccessShowing) return;
            isVerifySuccessShowing = true;
            if (verifySuccessToast) {
              verifySuccessToast.classList.remove("opacity-0", "pointer-events-none");
              verifySuccessToast.classList.add("opacity-100");
              verifySuccessToast.setAttribute("aria-hidden", "false");
              requestAnimationFrame(function () {
                requestAnimationFrame(function () {
                  if (verifySuccessToast) verifySuccessToast.classList.add("verify-success-toast--open");
                });
              });
            }
            window.setTimeout(function () {
              if (verifySuccessToast) {
                verifySuccessToast.classList.remove("verify-success-toast--open");
              }
              window.setTimeout(function () {
                if (verifySuccessToast) {
                  verifySuccessToast.classList.add("opacity-0", "pointer-events-none");
                  verifySuccessToast.classList.remove("opacity-100");
                  verifySuccessToast.setAttribute("aria-hidden", "true");
                }
                isVerifySuccessShowing = false;
                returnToStackAfterVerify();
              }, VERIFY_SUCCESS_SHEET_MS);
            }, VERIFY_SUCCESS_MS);
          });
        }
        if (!el) return;
        var WALLET_FIRST_ANIM_MS = 700;
        var WALLET_AFTER_FIRST_PAUSE_MS = 600;
        var WALLET_TO_BOTTOM_ANIM_MS = 700;
        var CARDS_AFTER_WALLET_MS = 100;
        var CARD_IN_ANIM_MS = 780;
        var CARD_STAGGER_MS = 190;
        // Ensure initial styles are applied before animating
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            el.classList.add("wallet-in");
          });
        });

        // After the first animation ends, set the size to 95% instantly (no middle scaling animation).
        setTimeout(function () {
          el.classList.add("wallet-resize");
        }, WALLET_FIRST_ANIM_MS + 20);

        // First motion (wallet-in) completes in WALLET_FIRST_ANIM_MS; pause WALLET_AFTER_FIRST_PAUSE_MS, then move wallet to bottom.
        setTimeout(function () {
          if (infoLayer) {
            infoLayer.classList.remove("opacity-0");
            infoLayer.classList.add("opacity-100");
          }
          var rect = el.getBoundingClientRect();
          var h = rect.height || 0;
          var frameH = frameShell ? frameShell.getBoundingClientRect().height : window.innerHeight;
          // Wallet is centered vertically (top:50% + translateY(-50%)). Move so it sits near frame bottom.
          // Push an extra +200px down from the bottom-aligned position, then move 25px up.
          var delta = frameH / 2 - h / 2 + 200 - 25;
          el.style.setProperty("--wallet-delta", delta + "px");
          el.classList.remove("wallet-in");
          el.classList.remove("wallet-resize");
          el.classList.add("wallet-bottom");
          window.setTimeout(onWalletBottomSettled, WALLET_TO_BOTTOM_ANIM_MS + 40);
        }, WALLET_FIRST_ANIM_MS + WALLET_AFTER_FIRST_PAUSE_MS);

        // Cards pop out 100ms after the wallet finishes moving to the bottom (700ms transform on #wallet-final).
        setTimeout(
          function () {
          if (infoLayer) {
            setTimeout(function () {
              infoLayer.classList.remove("top-1/2", "-translate-y-1/2");
              infoLayer.classList.add("top-[92px]", "-translate-y-0");
            }, 300);
          }
          var lastCardIndex = -1;
          for (var ci = 0; ci < cards.length; ci++) {
            if (cards[ci]) lastCardIndex = ci;
          }
          for (var i = 0; i < cards.length; i++) {
            if (!cards[i]) continue;
            (function (idx) {
              setTimeout(function () {
                cards[idx].classList.add("card-in");
              }, idx * CARD_STAGGER_MS);
            })(i);
          }
          var hintDelayMs = Math.max(
            0,
            (lastCardIndex >= 0 ? lastCardIndex * CARD_STAGGER_MS : 0) + CARD_IN_ANIM_MS - 120
          );
          resetCardVerifyUI({ deferStackHint: true });
          /* Auto last-4: after the last stacked card’s intro motion (~CARD_IN_ANIM_MS), enter verify on the top card and focus the chip — no tap (keyboard opens without user hitting the field). */
          if (VERIFY_AUTO_START_LAST4_ON_LOAD) {
            var settleMs =
              (lastCardIndex >= 0 ? lastCardIndex * CARD_STAGGER_MS : 0) + CARD_IN_ANIM_MS + 60;
            window.setTimeout(function () {
              if (postVerifyFinalStack) return;
              var topCard = cards[0];
              if (topCard && !isVerifying) startCardVerifyForCard(topCard);
            }, settleMs);
          } else if (cardSelectText) {
            window.setTimeout(function () {
              animateCardSelectHintReveal();
            }, hintDelayMs);
          }
        },
          WALLET_FIRST_ANIM_MS +
            WALLET_AFTER_FIRST_PAUSE_MS +
            WALLET_TO_BOTTOM_ANIM_MS +
            CARDS_AFTER_WALLET_MS
        );

        var stackResizeTimer = null;
        window.addEventListener("resize", function () {
          window.clearTimeout(stackResizeTimer);
          stackResizeTimer = window.setTimeout(function () {
            applyCardStackTops();
            if (isVerifying && activeCard) {
              syncDigitsWrapToActiveCard();
              scheduleVerifyKeyboardLift();
            }
            if (postVerifyFinalStack) {
              syncAddAnotherAboveStack();
            }
          }, 120);
        });
      })();
    </script>
  </body>
</html>
