<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=overlays-content"
    />
    <title>MyCards — ETB First Time</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] },
            colors: {
              brand: { DEFAULT: "#1C3FCA", hover: "#152f9e", link: "#1C3FCA" },
            },
            boxShadow: {
              sheet: "0 -8px 24px rgba(0, 0, 0, 0.08)",
            },
            spacing: {
              /* frame: header (hug) + hero (fill) + login + OTP sheets (fixed h-sheet) */
              header: "48px",
              sheet: "320px",
            },
          },
        },
      };
    </script>
    <style>
      html,
      body {
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
      }
      body {
        font-family: Inter, system-ui, sans-serif;
        -webkit-tap-highlight-color: transparent;
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        width: 100%;
        box-sizing: border-box;
        background: #ffffff;
        overscroll-behavior: none;
      }
      /* Phone shell: full width; min dynamic viewport height, grows with content */
      /* Whole phone column lifts together; --keyboard-lift set from visualViewport (see keyboard module). */
      .frame-root {
        --keyboard-lift: 0px;
        width: 100%;
        max-width: none;
        min-height: 100vh;
        height: 100dvh;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: linear-gradient(135deg, #080326 0%, #0e346b 100%);
        transform: translateY(calc(-1 * var(--keyboard-lift, 0px)));
        transition: transform 0.32s ease-in-out;
        will-change: transform;
        overscroll-behavior: none;
      }
      @supports not (height: 100dvh) {
        .frame-root {
          height: 100vh;
        }
      }
      /* Prevent iOS/Android scroll chaining / rubber-band bounce */
      .frame-root,
      #login-sheet,
      #otp-sheet {
        overscroll-behavior: none;
      }
      .btn-loading svg {
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      /* Mobile number — default vs active (floating label on border) */
      .mobile-field {
        position: relative;
      }
      .mobile-field__input {
        display: block;
        width: 100%;
        box-sizing: border-box;
        min-height: 52px;
        padding: 15px 14px 13px;
        border-radius: 14px;
        border: 1px solid #c5ced6;
        background: #fff;
        font-size: 15px;
        line-height: 1.25;
        color: #171717;
        outline: none;
        transition: border-color 0.2s ease, padding 0.2s ease, box-shadow 0.2s ease;
        -webkit-tap-highlight-color: transparent;
      }
      .mobile-field__input::placeholder {
        color: transparent;
      }
      .mobile-field__input:focus {
        border-color: #1C3FCA;
        box-shadow: 0 0 0 2px rgba(28, 63, 202, 0.2);
      }
      .mobile-field__input:focus,
      .mobile-field__input:not(:placeholder-shown) {
        padding-top: 19px;
        padding-bottom: 11px;
      }
      .mobile-field__label {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        max-width: calc(100% - 28px);
        font-size: 15px;
        font-weight: 400;
        line-height: 1.2;
        color: #737373;
        pointer-events: none;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        background: #fff;
        padding: 0 4px;
        margin-left: -4px;
        transition: top 0.2s ease, transform 0.2s ease, font-size 0.2s ease, color 0.2s ease,
          font-weight 0.2s ease;
      }
      .mobile-field__input:focus + .mobile-field__label,
      .mobile-field__input:not(:placeholder-shown) + .mobile-field__label {
        top: 0;
        transform: translateY(-50%);
        font-size: 12px;
        font-weight: 600;
        color: #1C3FCA;
      }
      /* Login + OTP sheets: hide scrollbars if any nested overflow appears */
      #login-sheet,
      #otp-sheet {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      #login-sheet::-webkit-scrollbar,
      #otp-sheet::-webkit-scrollbar {
        display: none;
        width: 0;
        height: 0;
      }
      /* Hero: MyCards lockup fixed; illustrations + headline rotate (3s) */
      .hero-stack {
        --hero-brand-h: 48px;
        box-sizing: border-box;
        position: absolute;
        inset: 0;
        z-index: 10;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .hero-brand-lockup {
        position: relative;
        z-index: 30;
        flex: 0 0 auto;
        height: var(--hero-brand-h);
        width: 100%;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        pointer-events: none;
      }
      .hero-brand-lockup img {
        display: block;
        width: 126px;
        height: 48px;
        max-width: 126px;
        max-height: 48px;
        flex-shrink: 0;
        object-fit: contain;
        object-position: center center;
        user-select: none;
        -webkit-user-drag: none;
      }
      .hero-carousel {
        box-sizing: border-box;
        position: relative;
        z-index: 10;
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }
      .hero-carousel__viewport {
        position: relative;
        flex: 1 1 auto;
        min-height: 0;
        width: 100%;
        overflow: hidden;
      }
      .hero-carousel__track {
        display: flex;
        width: 300%;
        height: 100%;
        transition: transform 0.48s ease-out;
        will-change: transform;
      }
      .hero-carousel__slide {
        flex: 0 0 33.333333%;
        position: relative;
        height: 100%;
        min-height: 0;
      }
      .hero-carousel__slide img {
        position: absolute;
        left: 50%;
        top: 0;
        transform: translateX(-50%);
        height: 100%;
        width: 100%;
        max-width: 100%;
        object-fit: contain;
        object-position: center top;
        pointer-events: none;
        user-select: none;
        -webkit-user-drag: none;
      }
      .hero-carousel__dots {
        position: absolute;
        left: 0;
        right: 0;
        bottom: -22px;
        z-index: 20;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        pointer-events: auto;
      }
      .hero-carousel__dot {
        width: 6px;
        height: 6px;
        border-radius: 9999px;
        padding: 0;
        border: none;
        background: rgba(255, 255, 255, 0.38);
        cursor: pointer;
        transition: width 0.2s ease, background 0.2s ease;
        -webkit-tap-highlight-color: transparent;
      }
      .hero-carousel__dot:focus {
        outline: none;
      }
      .hero-carousel__dot:focus-visible {
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.85);
      }
      .hero-carousel__dot--active {
        width: 18px;
        background: rgba(255, 255, 255, 0.92);
      }
      @media (prefers-reduced-motion: reduce) {
        .hero-carousel__track {
          transition: none !important;
        }
        .frame-root {
          transition: none;
          will-change: auto;
        }
        #otp-sheet {
          transition: none !important;
        }
      }
      /* OTP: single input box with 6 dots */
      #otp-code-field {
        position: relative;
        width: 100%;
        height: 48px;
        border-radius: 14px;
        border: 1px solid #9ca3af;
        background: #fff;
        overflow: hidden;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }
      #otp-code-field:focus-within {
        border-color: #1c3fca;
        box-shadow: 0 0 0 2px rgba(28, 63, 202, 0.2);
      }
      .otp-code-dots {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 44px;
        pointer-events: none;
      }
      .otp-code-dot {
        width: 14px;
        height: 14px;
        border-radius: 9999px;
        background: #d2d5db;
        transition: background-color 0.2s ease;
      }
      .otp-code-dot.otp-code-dot--filled {
        background: #111827;
      }
      #otp-raw {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        background: transparent;
        color: transparent;
        caret-color: transparent;
        -webkit-text-fill-color: transparent;
        outline: none;
      }
      /* Layer debug: open page with ?layers=1 */
      #layer-debug {
        position: fixed;
        top: 8px;
        right: 8px;
        z-index: 9999;
        width: min(100vw - 16px, 280px);
        max-height: min(70vh, 420px);
        overflow: auto;
        box-sizing: border-box;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.92);
        color: #e2e8f0;
        font-size: 11px;
        line-height: 1.35;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(148, 163, 184, 0.35);
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
      }
      #layer-debug h2 {
        margin: 0 0 8px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #94a3b8;
      }
      #layer-debug table {
        width: 100%;
        border-collapse: collapse;
      }
      #layer-debug th,
      #layer-debug td {
        text-align: left;
        padding: 4px 6px 4px 0;
        vertical-align: top;
        border-bottom: 1px solid rgba(51, 65, 85, 0.9);
      }
      #layer-debug th {
        color: #cbd5e1;
        font-weight: 600;
        width: 38%;
      }
      #layer-debug code {
        font-size: 10px;
        color: #a5b4fc;
        word-break: break-all;
      }
      #layer-debug button {
        margin-top: 8px;
        width: 100%;
        padding: 6px 8px;
        border-radius: 8px;
        border: 1px solid rgba(148, 163, 184, 0.5);
        background: rgba(30, 41, 59, 0.9);
        color: #f1f5f9;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
      }
      #layer-debug button[aria-pressed="true"] {
        background: #334155;
        border-color: #94a3b8;
      }
      html.layers-debug-outlines [data-layer] {
        outline: 2px dashed var(--layer-color, #f472b6);
        outline-offset: -2px;
      }
      [data-layer="header"] {
        --layer-color: #38bdf8;
      }
      [data-layer="hero"] {
        --layer-color: #a78bfa;
      }
      [data-layer="login"] {
        --layer-color: #34d399;
      }
      [data-layer="otp-backdrop"] {
        --layer-color: #fbbf24;
      }
      [data-layer="otp-sheet"] {
        --layer-color: #fb7185;
      }
      [data-layer="toast"] {
        --layer-color: #e2e8f0;
      }
    </style>
  </head>
  <body class="min-h-[100dvh] min-h-screen p-0 box-border w-full max-w-none">
    <!--
      PAGE LAYERS (stack inside .frame-root, then globals)

      [Body — outside frame]
        • White page chrome

      [.frame-root — gradient phone column]
        1. Header        data-layer="header"   z-30  (menu-header.svg + #btn-eva / #btn-menu)
        2. Hero          data-layer="hero"     .hero-stack: fixed .hero-brand-lockup + #hero-carousel + dots
        3. Login sheet   data-layer="login"    #login-sheet  z-20  (stays visible under OTP; frame lifts for keyboard)
        4. OTP backdrop  data-layer="otp-backdrop"  #otp-backdrop  z-[45]
        5. OTP sheet     data-layer="otp-sheet"     #otp-sheet     z-[50]  role="dialog"

      [Fixed on viewport]
        • Toast #toast   data-layer="toast"   z-50  (opacity 0 until shown; same z as OTP sheet — DOM order breaks ties)

      Dev: append ?layers=1 to this URL for a live stack table + optional outlines.
    -->
    <div class="frame-root relative w-full rounded-none sm:shadow-2xl">
      <!-- Top menu bar: exact Figma export (360×48), see assets/menu-header.svg -->
      <header class="relative z-30 h-header w-full shrink-0 overflow-hidden" data-layer="header">
        <img
          src="assets/menu-header.svg"
          width="360"
          height="48"
          alt=""
          class="pointer-events-none block h-header w-full max-w-full select-none"
          draggable="false"
        />
        <button
          type="button"
          id="btn-eva"
          class="absolute left-0 top-0 z-10 h-header w-[min(280px,78%)] bg-transparent active:bg-white/10 focus:outline-none focus-visible:ring-2 focus-visible:ring-white/70"
          aria-label="Ask EVA"
        ></button>
        <button
          type="button"
          id="btn-menu"
          class="absolute right-[10px] top-1/2 z-10 h-10 w-10 -translate-y-1/2 rounded-full bg-transparent active:bg-white/10 focus:outline-none focus-visible:ring-2 focus-visible:ring-white/70"
          aria-label="Open menu"
        ></button>
      </header>

      <!-- Hero: MyCards lockup fixed; three illustration cards rotate (auto 3s) -->
      <div class="relative w-full min-h-0 flex-1 overflow-hidden" data-layer="hero">
        <div class="hero-stack">
          <div class="hero-brand-lockup" aria-hidden="true">
            <img
              src="assets/etb-hero-marketing.svg"
              width="126"
              height="48"
              alt=""
              draggable="false"
            />
          </div>
          <div
            id="hero-carousel"
            class="hero-carousel"
            role="region"
            aria-roledescription="carousel"
            aria-label="Highlights"
          >
            <div class="hero-carousel__viewport">
              <div class="hero-carousel__track" id="hero-carousel-track">
                <div
                  class="hero-carousel__slide"
                  data-hero-slide="0"
                  aria-hidden="false"
                >
                  <img
                    src="assets/hero-carousel-card-01.svg"
                    width="328"
                    height="234"
                    alt=""
                    draggable="false"
                  />
                </div>
                <div class="hero-carousel__slide" data-hero-slide="1" aria-hidden="true">
                  <img
                    src="assets/hero-carousel-card-02.svg"
                    width="328"
                    height="234"
                    alt=""
                    draggable="false"
                  />
                </div>
                <div class="hero-carousel__slide" data-hero-slide="2" aria-hidden="true">
                  <img
                    src="assets/hero-carousel-card-03.svg"
                    width="328"
                    height="234"
                    alt=""
                    draggable="false"
                  />
                </div>
              </div>
            </div>
            <div class="hero-carousel__dots" role="tablist" aria-label="Card">
              <button
                type="button"
                class="hero-carousel__dot hero-carousel__dot--active"
                role="tab"
                aria-selected="true"
                aria-label="Card 1 of 3"
              ></button>
              <button
                type="button"
                class="hero-carousel__dot"
                role="tab"
                aria-selected="false"
                aria-label="Card 2 of 3"
              ></button>
              <button
                type="button"
                class="hero-carousel__dot"
                role="tab"
                aria-selected="false"
                aria-label="Card 3 of 3"
              ></button>
            </div>
          </div>
        </div>
      </div>

      <!-- Bottom sheet: interactive layer (matches Figma spacing; graphics above are unchanged) -->
      <div
        id="login-sheet"
        data-layer="login"
        class="flex flex-col flex-none h-sheet min-h-0 shrink-0 bg-white rounded-t-[24px] shadow-sheet relative z-20 overflow-hidden px-6 pt-0 pb-0 translate-y-0 opacity-100"
      >
        <!-- Login Details top border (4px gradient) -->
        <div
          aria-hidden="true"
          class="absolute left-0 right-0 top-0 h-[4px] bg-[linear-gradient(90deg,#FFB6BA_0%,#1C3FCA_50%,#FFB1B6_100%)] z-[1]"
        ></div>
        <div class="relative z-10 flex min-h-0 flex-1 flex-col overflow-hidden pt-6 pb-[30px]">
          <h2 class="text-[17px] font-bold text-neutral-900 leading-tight mb-2">Let’s Get Started</h2>

          <div class="mobile-field block">
            <input
              id="mobile"
              type="tel"
              inputmode="numeric"
              maxlength="10"
              autocomplete="tel-national"
              placeholder=" "
              aria-describedby="info-text"
              class="mobile-field__input"
            />
            <label class="mobile-field__label" for="mobile">Mobile Number</label>
          </div>
        <p id="info-text" class="mt-2 text-[12px] text-neutral-500 leading-snug">
          You’ll receive an OTP on this number
        </p>
        <p id="input-hint" class="mt-1 text-xs min-h-[1rem] text-red-600 hidden"></p>

          <button
            type="button"
            id="btn-otp"
            class="mt-5 w-full rounded-xl bg-brand py-3 text-[14px] font-bold text-white tracking-wide shadow-sm transition-colors hover:bg-brand-hover active:bg-brand-hover focus:outline-none focus-visible:ring-2 focus-visible:ring-brand focus-visible:ring-offset-2 disabled:opacity-60 disabled:pointer-events-none flex items-center justify-center gap-2 touch-manipulation"
            aria-label="Get OTP"
          >
            <span id="otp-label">Get OTP</span>
            <span id="otp-spinner" class="hidden btn-loading">
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" stroke-opacity="0.25" />
                <path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round" />
              </svg>
            </span>
          </button>

          <div
            class="mt-8 box-border flex max-w-none w-[calc(100%+3rem)] -mx-6 flex-col items-center pt-2 pb-2"
          >
            <p class="w-full px-6 text-center text-[11px] leading-snug text-neutral-400">
              © Copyright 2023 HDFC Bank Ltd.
            </p>
            <nav
              class="mt-2.5 flex w-full max-w-none flex-wrap items-center justify-center gap-x-3 gap-y-1 px-6 text-[12px] font-semibold leading-snug text-brand-link"
            >
              <a href="#" class="hover:underline focus:outline-none focus-visible:ring-2 focus-visible:ring-brand rounded px-0.5"
                >Cookie Policy</a
              >
              <a href="#" class="hover:underline focus:outline-none focus-visible:ring-2 focus-visible:ring-brand rounded px-0.5"
                >Terms &amp; Conditions</a
              >
              <a href="#" class="hover:underline focus:outline-none focus-visible:ring-2 focus-visible:ring-brand rounded px-0.5"
                >Privacy Policy</a
              >
            </nav>
          </div>
        </div>
      </div>

      <!-- OTP layer: bottom sheet — flush to frame bottom (height matches login sheet token) -->
      <div
        id="otp-backdrop"
        data-layer="otp-backdrop"
        class="absolute inset-0 bg-black/25 opacity-0 pointer-events-none transition-opacity duration-[320ms] ease-in-out z-[45]"
        aria-hidden="true"
      ></div>
      <div
        id="otp-sheet"
        data-layer="otp-sheet"
        class="absolute left-0 right-0 bottom-0 h-sheet w-full max-w-full bg-[#fdfeff] rounded-t-[26px] overflow-hidden translate-y-full opacity-0 pointer-events-none transition-[transform,opacity,bottom] duration-[320ms] ease-in-out z-[50]"
        role="dialog"
        aria-modal="true"
        aria-label="Enter OTP"
      >
        <!-- OTP top gradient edge (4px) -->
        <div
          aria-hidden="true"
          class="absolute left-0 right-0 top-0 h-[4px] bg-[linear-gradient(90deg,#FFB6BA_0%,#1C3FCA_50%,#FFB1B6_100%)]"
        ></div>

        <div class="pt-6 px-6 h-full min-h-0 flex flex-col items-center gap-[24px] relative">
          <div class="w-[312px] text-center shrink-0">
            <p class="font-semibold text-[#222] text-[18px] leading-[1.4]">Enter OTP</p>
            <p class="mt-[12px] text-[#444] font-normal text-[14px] leading-[1.4]">
              An OTP has been sent on
              <span class="text-[#222]">••••••</span>
              <span id="otp-last4" class="text-[#222]">3210</span>
            </p>
            <a
              href="#"
              id="otp-change-mobile"
              class="mt-2 inline-block text-[14px] font-medium text-[#1C3FCA] hover:underline focus:outline-none focus-visible:ring-2 focus-visible:ring-[#1C3FCA] rounded touch-manipulation"
            >
              Change Mobile Number
            </a>
          </div>

          <div
            id="otp-code-field"
            class="relative w-full shrink-0"
            role="group"
            aria-label="Enter 6-digit OTP"
          >
            <div class="otp-code-dots" aria-hidden="true">
              <span class="otp-code-dot"></span>
              <span class="otp-code-dot"></span>
              <span class="otp-code-dot"></span>
              <span class="otp-code-dot"></span>
              <span class="otp-code-dot"></span>
              <span class="otp-code-dot"></span>
            </div>
            <input
              id="otp-raw"
              type="tel"
              inputmode="numeric"
              pattern="[0-9]*"
              maxlength="6"
              autocomplete="one-time-code"
              aria-label="OTP code"
            />
          </div>

          <div class="w-full shrink-0 flex items-center justify-between text-[16px]">
            <a
              href="#"
              id="otp-resend"
              class="text-[#1C3FCA] font-medium hover:underline focus:outline-none focus-visible:ring-2 focus-visible:ring-[#1C3FCA] rounded touch-manipulation"
            >
              Resend OTP
            </a>
            <span id="otp-didnt" class="text-[#505c65] font-normal">Didn’t receive?</span>
          </div>

          <button
            type="button"
            id="otp-verify"
            disabled
            class="w-full shrink-0 rounded-[11px] bg-[#1C3FCA] py-[12px] text-[16px] font-semibold text-white shadow-sm transition-opacity disabled:pointer-events-none disabled:opacity-50 touch-manipulation"
          >
            Verify OTP
          </button>

          <div class="flex-1 min-h-0"></div>
        </div>
      </div>
    </div>

    <div
      id="toast"
      data-layer="toast"
      class="fixed bottom-6 left-1/2 -translate-x-1/2 max-w-[90vw] px-4 py-2.5 rounded-lg bg-neutral-900 text-white text-sm shadow-lg opacity-0 pointer-events-none transition-opacity duration-300 z-50"
      role="status"
    ></div>

    <div id="layer-debug" hidden></div>

    <script>
      (function initLayerDebug() {
        try {
          var q = new URLSearchParams(window.location.search);
          if (q.get("layers") !== "1" && q.get("layers") !== "true") return;
        } catch (e) {
          return;
        }
        var panel = document.getElementById("layer-debug");
        if (!panel) return;
        panel.hidden = false;

        var rows = [
          { label: "Header", el: document.querySelector('[data-layer="header"]'), note: "z-30" },
          { label: "Hero", el: document.querySelector('[data-layer="hero"]'), note: "art z-10 inside" },
          { label: "Login", el: document.getElementById("login-sheet"), note: "z-20" },
          { label: "OTP dim", el: document.getElementById("otp-backdrop"), note: "z-45" },
          { label: "OTP sheet", el: document.getElementById("otp-sheet"), note: "z-50" },
          { label: "Toast", el: document.getElementById("toast"), note: "z-50 fixed" },
        ];

        function zOf(el) {
          if (!el) return "—";
          var z = window.getComputedStyle(el).zIndex;
          return z === "auto" ? "auto" : z;
        }

        function otpOpen() {
          var s = document.getElementById("otp-sheet");
          return s && s.classList.contains("translate-y-0");
        }

        function render() {
          var tb = [];
          tb.push("<h2>Layers (?layers=1)</h2>");
          tb.push("<table><thead><tr><th>Layer</th><th>z-index</th></tr></thead><tbody>");
          for (var i = 0; i < rows.length; i++) {
            var r = rows[i];
            tb.push(
              "<tr><th>" +
                r.label +
                "</th><td><code>" +
                zOf(r.el) +
                "</code><br><span style='color:#64748b'>" +
                r.note +
                "</span></td></tr>"
            );
          }
          tb.push("</tbody></table>");
          tb.push(
            "<p style='margin:8px 0 0;color:#94a3b8'>OTP open: <strong style='color:#e2e8f0'>" +
              (otpOpen() ? "yes" : "no") +
              "</strong></p>"
          );
          panel.innerHTML = tb.join("");
          var btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = "Outline layers";
          btn.setAttribute("aria-pressed", document.documentElement.classList.contains("layers-debug-outlines") ? "true" : "false");
          btn.addEventListener("click", function () {
            var on = document.documentElement.classList.toggle("layers-debug-outlines");
            btn.setAttribute("aria-pressed", on ? "true" : "false");
          });
          panel.appendChild(btn);
        }

        render();
        var mo = new MutationObserver(render);
        var otpSheet = document.getElementById("otp-sheet");
        if (otpSheet) mo.observe(otpSheet, { attributes: true, attributeFilter: ["class"] });
      })();

      (function initHeroCarousel() {
        var root = document.getElementById("hero-carousel");
        var track = document.getElementById("hero-carousel-track");
        if (!root || !track) return;

        var dots = root.querySelectorAll(".hero-carousel__dot");
        var originalSlides = Array.prototype.slice.call(
          track.querySelectorAll(".hero-carousel__slide"),
          0
        );
        var n = originalSlides.length;
        if (!n || !dots.length) return;

        var timer = null;
        var ms = 3000;
        var reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        var transitionCss = "transform 0.48s ease-out";

        // Infinite belt: prepend last clone + append first clone.
        var firstClone = originalSlides[0].cloneNode(true);
        var lastClone = originalSlides[n - 1].cloneNode(true);
        firstClone.setAttribute("aria-hidden", "true");
        lastClone.setAttribute("aria-hidden", "true");
        track.insertBefore(lastClone, originalSlides[0]);
        track.appendChild(firstClone);

        var allSlides = Array.prototype.slice.call(
          track.querySelectorAll(".hero-carousel__slide"),
          0
        );
        var total = allSlides.length;

        track.style.width = total * 100 + "%";
        for (var s = 0; s < allSlides.length; s++) {
          allSlides[s].style.flex = "0 0 " + 100 / total + "%";
        }

        // Start at first real slide (index 1 because index 0 is prepended clone).
        var visualIndex = 1;
        var logicalIndex = 0;
        var isTransitioning = false;

        function paintDots() {
          for (var d = 0; d < dots.length; d++) {
            var on = d === logicalIndex;
            dots[d].setAttribute("aria-selected", on ? "true" : "false");
            dots[d].classList.toggle("hero-carousel__dot--active", on);
          }
        }

        function paintAria() {
          for (var i = 0; i < allSlides.length; i++) {
            allSlides[i].setAttribute("aria-hidden", "true");
          }
          var activeReal = logicalIndex + 1;
          if (allSlides[activeReal]) allSlides[activeReal].setAttribute("aria-hidden", "false");
        }

        function setTrackPosition(useTransition) {
          track.style.transition = useTransition && !reducedMotion ? transitionCss : "none";
          track.style.transform = "translateX(-" + (visualIndex * 100) / total + "%)";
        }

        function applyNow() {
          paintDots();
          paintAria();
          setTrackPosition(false);
        }

        function next() {
          if (isTransitioning || reducedMotion) {
            if (reducedMotion) {
              logicalIndex = (logicalIndex + 1) % n;
              visualIndex = logicalIndex + 1;
              applyNow();
            }
            return;
          }
          isTransitioning = true;
          logicalIndex = (logicalIndex + 1) % n;
          visualIndex += 1;
          paintDots();
          paintAria();
          setTrackPosition(true);
        }

        function go(ix) {
          logicalIndex = ((ix % n) + n) % n;
          visualIndex = logicalIndex + 1;
          paintDots();
          paintAria();
          setTrackPosition(!reducedMotion);
          restartTimer();
        }

        function restartTimer() {
          clearInterval(timer);
          timer = null;
          if (reducedMotion) return;
          timer = window.setInterval(next, ms);
        }

        // Core seamless reset:
        // when animation lands on a clone, jump instantly to matching real slide with transition off.
        track.addEventListener("transitionend", function (ev) {
          if (ev.target !== track || ev.propertyName !== "transform") return;
          isTransitioning = false;
          if (visualIndex === total - 1) {
            visualIndex = 1;
            setTrackPosition(false);
          } else if (visualIndex === 0) {
            visualIndex = n;
            setTrackPosition(false);
          }
        });

        applyNow();
        restartTimer();

        document.addEventListener("visibilitychange", function () {
          if (document.hidden) {
            clearInterval(timer);
            timer = null;
          } else {
            restartTimer();
          }
        });

        for (var d = 0; d < dots.length; d++) {
          (function (idx) {
            dots[idx].addEventListener("click", function () {
              go(idx);
            });
          })(d);
        }
      })();

      (function () {
        var infoText = document.getElementById("info-text");
        var otpSheet = document.getElementById("otp-sheet");
        var otpBackdrop = document.getElementById("otp-backdrop");
        var otpLast4 = document.getElementById("otp-last4");
        var otpVerifyBtn = document.getElementById("otp-verify");
        var otpResend = document.getElementById("otp-resend");
        var otpCodeField = document.getElementById("otp-code-field");
        var otpRaw = document.getElementById("otp-raw");
        var otpDotNodes = otpCodeField
          ? Array.prototype.slice.call(otpCodeField.querySelectorAll(".otp-code-dot"), 0)
          : [];

        function otpDigits() {
          if (!otpRaw) return "";
          return (otpRaw.value || "").replace(/\D/g, "").slice(0, 6);
        }

        function clearOtpDigits() {
          if (otpRaw) otpRaw.value = "";
          syncOtpDots();
          syncOtpVerifyButton();
        }

        function syncOtpVerifyButton() {
          otpVerifyBtn.disabled = otpDigits().length !== 6;
        }

        function syncOtpDots() {
          var filled = otpDigits().length;
          for (var i = 0; i < otpDotNodes.length; i++) {
            otpDotNodes[i].classList.toggle("otp-code-dot--filled", i < filled);
          }
        }

        function showToast(msg) {
          var t = document.getElementById("toast");
          t.textContent = msg;
          t.classList.remove("opacity-0");
          clearTimeout(showToast._h);
          showToast._h = setTimeout(function () {
            t.classList.add("opacity-0");
          }, 2200);
        }

        document.getElementById("btn-eva").addEventListener("click", function () {
          showToast("Ask EVA");
        });
        document.getElementById("btn-menu").addEventListener("click", function () {
          showToast("Menu");
        });

        var mobile = document.getElementById("mobile");
        var hint = document.getElementById("input-hint");
        var btnOtp = document.getElementById("btn-otp");
        var otpLabel = document.getElementById("otp-label");
        var otpSpinner = document.getElementById("otp-spinner");
        var frameRoot = document.querySelector(".frame-root");
        var isMobileInputFocused = false;
        var isOtpInputFocused = false;
        var otpSheetOpen = false;
        var keyboardHandoffActive = false;

        var defaultInfoText = "You’ll receive an OTP on this number";

        function setInfoText(text, isError) {
          infoText.textContent = text;
          if (isError) {
            infoText.classList.remove("text-neutral-500");
            infoText.classList.add("text-red-600");
          } else {
            infoText.classList.remove("text-red-600");
            infoText.classList.add("text-neutral-500");
          }
        }

        mobile.addEventListener("input", function () {
          this.value = this.value.replace(/\D/g, "").slice(0, 10);
          hint.classList.add("hidden");
          setInfoText(defaultInfoText, false);
        });

        /* -------------------------------------------------------------------------- *
         * Keyboard lift module — uses window.visualViewport to find how much of the
         * layout is covered by the soft keyboard, then translates .frame-root upward
         * via CSS var --keyboard-lift (smooth 320ms ease-in-out). No innerHeight resize
         * hacks; preventScroll on focus avoids iOS jump-scroll fighting this transform.
         * -------------------------------------------------------------------------- */
        var liftDebounceTimer = null;
        var liftRaf = null;
        var lastLiftPx = -1;

        function visualViewportBottomY() {
          var vv = window.visualViewport;
          if (!vv) return window.innerHeight;
          return vv.offsetTop + vv.height;
        }

        function clearKeyboardLift() {
          lastLiftPx = -1;
          if (frameRoot) frameRoot.style.setProperty("--keyboard-lift", "0px");
        }

        function applyKeyboardLift() {
          if (!frameRoot) return;
          if (liftRaf) cancelAnimationFrame(liftRaf);
          liftRaf = requestAnimationFrame(function () {
            liftRaf = null;
            var margin = 14;
            var bottomY = visualViewportBottomY();
            var targetEl = otpSheetOpen ? otpVerifyBtn : btnOtp;
            if (!targetEl) return;
            var lift = Math.max(0, Math.round(targetEl.getBoundingClientRect().bottom - bottomY + margin));
            var cap = Math.round(window.innerHeight * 0.92);
            if (lift > cap) lift = cap;
            if (lift === lastLiftPx) return;
            lastLiftPx = lift;
            frameRoot.style.setProperty("--keyboard-lift", lift + "px");
          });
        }

        function scheduleApplyKeyboardLift() {
          clearTimeout(liftDebounceTimer);
          liftDebounceTimer = window.setTimeout(function () {
            liftDebounceTimer = null;
            if (!isMobileInputFocused && !isOtpInputFocused && !otpSheetOpen) {
              clearKeyboardLift();
              return;
            }
            applyKeyboardLift();
          }, 48);
        }

        if (window.visualViewport) {
          window.visualViewport.addEventListener("resize", scheduleApplyKeyboardLift);
          window.visualViewport.addEventListener("scroll", scheduleApplyKeyboardLift);
        }

        mobile.addEventListener("pointerdown", function () {
          if (document.activeElement !== mobile) {
            try {
              mobile.focus({ preventScroll: true });
            } catch (e) {
              mobile.focus();
            }
          }
        });

        mobile.addEventListener("focus", function () {
          isMobileInputFocused = true;
          scheduleApplyKeyboardLift();
        });

        mobile.addEventListener("blur", function () {
          isMobileInputFocused = false;
          if (keyboardHandoffActive) {
            scheduleApplyKeyboardLift();
            return;
          }
          if (!isOtpInputFocused && !otpSheetOpen) clearKeyboardLift();
          else scheduleApplyKeyboardLift();
        });

        if (otpCodeField) {
          otpCodeField.addEventListener("focusin", function () {
            isOtpInputFocused = true;
            scheduleApplyKeyboardLift();
          });
          otpCodeField.addEventListener("focusout", function () {
            window.setTimeout(function () {
              if (otpCodeField.contains(document.activeElement)) return;
              isOtpInputFocused = false;
              if (!isMobileInputFocused && !otpSheetOpen) clearKeyboardLift();
              else scheduleApplyKeyboardLift();
            }, 0);
          });
        }

        if (otpRaw) {
          otpRaw.addEventListener("pointerdown", function () {
            if (document.activeElement !== otpRaw) {
              try {
                otpRaw.focus({ preventScroll: true });
              } catch (e1) {
                otpRaw.focus();
              }
            }
          });
          otpRaw.addEventListener("input", function () {
            this.value = this.value.replace(/\D/g, "").slice(0, 6);
            syncOtpDots();
            syncOtpVerifyButton();
            scheduleApplyKeyboardLift();
          });
        }

        function focusOtpField() {
          if (!otpRaw) return;
          try {
            otpRaw.focus({ preventScroll: true });
          } catch (e5) {
            otpRaw.focus();
          }
          requestAnimationFrame(function () {
            try {
              otpRaw.focus({ preventScroll: true });
            } catch (e6) {
              otpRaw.focus();
            }
          });
        }

        function handOffFocusMobileToOtp() {
          /* Flag first so a synchronous mobile blur during OTP focus does not zero the lift. */
          keyboardHandoffActive = true;
          mobile.readOnly = true;
          focusOtpField();
          window.setTimeout(function () {
            keyboardHandoffActive = false;
            scheduleApplyKeyboardLift();
          }, 200);
        }

        function openOtp(last4) {
          otpLast4.textContent = last4;

          if (
            otpSheet.classList.contains("translate-y-0") &&
            otpSheet.classList.contains("opacity-100")
          ) {
            clearOtpDigits();
            handOffFocusMobileToOtp();
            return;
          }

          clearOtpDigits();
          clearTimeout(openOtp._focusTimer);
          openOtp._focusTimer = null;

          otpSheetOpen = true;
          /* readOnly keeps the numeric IME session while focus moves to OTP fields (no intentional blur-dismiss). */
          mobile.readOnly = true;

          otpSheet.classList.remove("translate-y-full", "opacity-0", "pointer-events-none");
          otpSheet.classList.add("translate-y-0", "opacity-100", "pointer-events-auto");
          otpBackdrop.classList.remove("opacity-0", "pointer-events-none");
          otpBackdrop.classList.add("opacity-100", "pointer-events-auto");

          var swapDone = false;
          function afterSheetSwap() {
            if (swapDone) return;
            swapDone = true;
            clearTimeout(openOtp._focusTimer);
            openOtp._focusTimer = null;
            otpSheet.removeEventListener("transitionend", onOtpSheetTe);
            handOffFocusMobileToOtp();
          }

          if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
            afterSheetSwap();
            return;
          }

          function onOtpSheetTe(ev) {
            if (ev.target !== otpSheet) return;
            if (ev.propertyName !== "transform") return;
            afterSheetSwap();
          }
          otpSheet.addEventListener("transitionend", onOtpSheetTe);
          openOtp._focusTimer = window.setTimeout(afterSheetSwap, 360);
        }

        function closeOtp() {
          otpSheetOpen = false;
          keyboardHandoffActive = false;
          mobile.readOnly = false;
          clearTimeout(openOtp._focusTimer);
          openOtp._focusTimer = null;
          if (document.activeElement && otpCodeField && otpCodeField.contains(document.activeElement)) {
            document.activeElement.blur();
          }
          clearOtpDigits();
          otpSheet.classList.add("translate-y-full", "opacity-0", "pointer-events-none");
          otpSheet.classList.remove("translate-y-0", "opacity-100", "pointer-events-auto");
          otpBackdrop.classList.add("opacity-0", "pointer-events-none");
          otpBackdrop.classList.remove("opacity-100", "pointer-events-auto");
          isOtpInputFocused = false;
          if (!isMobileInputFocused) clearKeyboardLift();
          else scheduleApplyKeyboardLift();
        }

        otpBackdrop.addEventListener("click", function () {
          closeOtp();
        });

        otpResend.addEventListener("click", function (e) {
          e.preventDefault();
          showToast("Resent OTP");
        });

        document.getElementById("otp-change-mobile").addEventListener("click", function (e) {
          e.preventDefault();
          closeOtp();
          window.setTimeout(function () {
            try {
              mobile.focus({ preventScroll: true });
            } catch (e7) {
              mobile.focus();
            }
          }, 50);
        });

        otpVerifyBtn.addEventListener("click", function () {
          if (otpDigits().length !== 6) {
            showToast("Enter the 6-digit OTP");
            return;
          }
          window.location.href = "verify.html";
        });

        syncOtpDots();
        syncOtpVerifyButton();

        var getOtpFlowActive = false;
        function runGetOtpFlow() {
          if (btnOtp.disabled || getOtpFlowActive) return;
          var v = mobile.value.trim();
          if (!/^\d{10}$/.test(v)) {
            hint.classList.add("hidden");
            setInfoText("Enter valid Mobile number", true);
            try {
              mobile.focus({ preventScroll: true });
            } catch (e8) {
              mobile.focus();
            }
            return;
          }

          getOtpFlowActive = true;
          setInfoText(defaultInfoText, false);
          btnOtp.disabled = true;
          btnOtp.setAttribute("aria-busy", "true");
          otpLabel.classList.add("hidden");
          otpSpinner.classList.remove("hidden");

          openOtp(v.slice(-4));

          window.setTimeout(function () {
            otpSpinner.classList.add("hidden");
            otpLabel.classList.remove("hidden");
            otpLabel.textContent = "Get OTP";
            btnOtp.disabled = false;
            btnOtp.setAttribute("aria-busy", "false");
            getOtpFlowActive = false;
          }, 1500);
        }

        btnOtp.addEventListener("click", function () {
          runGetOtpFlow();
        });
      })();
    </script>
  </body>
</html>
